<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carriers</title>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { font-family: 'Comfortaa', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); border-radius: 50%; border-top: 4px solid #4338ca; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        .field-spinner { width: 16px; height: 16px; border-top-color: #6d28d9; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <!-- Immediate Layout Cache Injection to Prevent Page Navigation Flicker -->
    <script>
        (() => {
            try {
                const cachedHeader = sessionStorage.getItem('component-header.html');
                const cachedFooter = sessionStorage.getItem('component-footer.html');
                if (!cachedHeader && !cachedFooter) return;
                
                const observer = new MutationObserver((mutations, obs) => {
                    const headerEl = cachedHeader ? document.getElementById('header-placeholder') : null;
                    const footerEl = cachedFooter ? document.getElementById('footer-placeholder') : null;
                    
                    if (headerEl && headerEl.getAttribute('data-fully-loaded') !== 'true') {
                        const doc = new DOMParser().parseFromString(cachedHeader, 'text/html');
                        const scripts = Array.from(doc.querySelectorAll('script'));
                        headerEl.innerHTML = '';
                        while (doc.body.firstChild) headerEl.appendChild(doc.body.firstChild);
                        
                        // Hydrate login/logout visibility state immediately to prevent visual flicker
                        const loginData = localStorage.getItem('loginData');
                        if (loginData) {
                            const loginBtn = headerEl.querySelector('#login-button');
                            if (loginBtn) loginBtn.classList.add('hidden');
                            
                            const publicNav = headerEl.querySelector('#container-desktop-public');
                            if (publicNav) publicNav.classList.add('hidden');
                            
                            const globalNotif = headerEl.querySelector('#notification-container-global');
                            if (globalNotif) globalNotif.classList.remove('hidden');

                            const searchBtn = headerEl.querySelector('#nav-search-private');
                            if (searchBtn) searchBtn.classList.remove('hidden');

                            const pincodeBtn = headerEl.querySelector('#nav-pincode-private');
                            if (pincodeBtn) pincodeBtn.classList.remove('hidden');

                            const privateNav = headerEl.querySelector('#container-desktop-private');
                            if (privateNav) {
                                privateNav.classList.remove('hidden');
                                privateNav.classList.add('flex');
                            }

                            const desktopLogout = headerEl.querySelector('#desktop-logout-button');
                            if (desktopLogout) {
                                desktopLogout.classList.remove('hidden');
                                desktopLogout.style.display = window.innerWidth >= 1280 ? 'flex' : 'none';
                            }
                            
                            const sidebarToggle = headerEl.querySelector('#sidebar-toggle-container');
                            if (sidebarToggle) sidebarToggle.classList.remove('hidden');
                        }
                        
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) newScript.src = script.src;
                            else newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        });
                        headerEl.setAttribute('data-fully-loaded', 'true');
                    }
                    
                    if (footerEl && footerEl.getAttribute('data-fully-loaded') !== 'true') {
                        const doc = new DOMParser().parseFromString(cachedFooter, 'text/html');
                        const scripts = Array.from(doc.querySelectorAll('script'));
                        footerEl.innerHTML = '';
                        while (doc.body.firstChild) footerEl.appendChild(doc.body.firstChild);
                        
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) newScript.src = script.src;
                            else newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        });
                        footerEl.setAttribute('data-fully-loaded', 'true');
                    }
                    
                    if ((!cachedHeader || (headerEl && headerEl.getAttribute('data-fully-loaded') === 'true')) &&
                        (!cachedFooter || (footerEl && footerEl.getAttribute('data-fully-loaded') === 'true'))) {
                        obs.disconnect();
                    }
                });
                
                observer.observe(document.documentElement, { childList: true, subtree: true });
            } catch (_) {}
        })();
    </script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <div class="split-view">
        <aside id="carrierListContainer">
            <div class="sv-pane-header">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-800">Carriers</h2>
                    <div>
                        <button id="newCarrierBtn" class="btn btn-sm">New</button>
                        <button id="deleteCarrierBtn" class="hidden btn-danger btn-sm ml-2">Delete</button>
                    </div>
                </div>
                <input type="text" id="searchCarrier" placeholder="Search carriers..." class="mt-2 form-input text-sm">
            </div>
            <div class="sv-pane-body">
                <ul id="carrierList">
                    <li id="carrierLoader" class="text-center text-gray-500 p-4">Loading carriers...</li>
                </ul>
            </div>
        </aside>

        <main id="carrierFormContainer" class="p-8 hidden md:block">
             <div class="p-4 border-b md:hidden bg-white -mt-8 -mx-8 mb-8">

                    Back to List
                </button>
            </div>

                    <p class="text-gray-600 mt-2">Select a carrier to edit, or create a new one.</p>

                        <div class="md:col-span-2">

                        </div>
                        <div class="md:col-span-4">
                            <label for="companyName" class="block mb-2 text-sm font-medium text-gray-700">Company Name</label>
                            <input type="text" id="companyName" name="COMPANY_NAME" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="e.g., Express Logistics">
                        </div>
                        <div class="md:col-span-3">
                            <label for="logoUrlGdrive" class="block mb-2 text-sm font-medium text-gray-700">Logo URL (G-Drive)</label>
                            <input type="url" id="logoUrlGdrive" name="LOGO_URL_GDRIVE" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="https://">
                        </div>
                        <div class="md:col-span-3">
                            <label for="logoUrlPostimg" class="block mb-2 text-sm font-medium text-gray-700">Logo URL (PostIMG)</label>
                            <input type="url" id="logoUrlPostimg" name="LOGO_URL_POSTIMG" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="https://">
                        </div>
                        <div class="md:col-span-3">
                            <label for="gstin" class="block mb-2 text-sm font-medium text-gray-700">GSTIN</label>
                            <input type="text" id="gstin" name="GSTIN" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="15-digit GSTIN" maxlength="15">

                            <input type="text" id="companyAddress" name="COMPANY_ADDRESS" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="123 Commerce St">

                            <input type="text" id="companyState" name="COMPANY_STATE" class="bg-gray-200 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5" placeholder="State" readonly>

                        </div>
                        <div class="md:col-span-3">
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-700">Email</label>

                        </div>

                            <label for="mobile" class="block mb-2 text-sm font-medium text-gray-700">Company Mobile</label>
                            <input type="text" id="mobile" name="MOBILE" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="91XXXXXXXXXX" maxlength="12">

                            <label for="contactPerson" class="block mb-2 text-sm font-medium text-gray-700">Contact Person</label>
                            <input type="text" id="contactPerson" name="CONTACT_PERSON" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="Contact Person Name">
                        </div>
                        <div class="md:col-span-3">
                            <label for="contactMobile" class="block mb-2 text-sm font-medium text-gray-700">Contact Mobile</label>
                            <input type="text" id="contactMobile" name="CONTACT_MOBILE" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="91XXXXXXXXXX" maxlength="12">
                        </div>
                        <div class="md:col-span-3">
                            <label for="bankName" class="block mb-2 text-sm font-medium text-gray-700">Bank Name</label>
                            <input type="text" id="bankName" name="BANK_NAME" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="Bank Name">
                        </div>
                        <div class="md:col-span-3">
                            <label for="bankAc" class="block mb-2 text-sm font-medium text-gray-700">Bank Account No.</label>
                            <input type="text" id="bankAc" name="BANK_AC" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="Account Number">
                        </div>
                        <div class="md:col-span-3">
                            <label for="ifsc" class="block mb-2 text-sm font-medium text-gray-700">IFSC Code</label>
                            <input type="text" id="ifsc" name="IFSC" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="IFSC Code" maxlength="11">
                        </div>
                        <div class="md:col-span-3">
                            <label for="upi" class="block mb-2 text-sm font-medium text-gray-700">UPI ID</label>
                            <input type="text" id="upi" name="UPI" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" placeholder="UPI ID">

                    </div>
                    <!-- MODES & ZONES Section -->
                    <div class="md:col-span-6 border-t pt-6 mt-4">
                        <h3 class="text-lg font-medium text-indigo-600 mb-4">Service Modes &amp; Zones</h3>
                    </div>

                        </div>

                    <div class="md:col-span-6">

                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" class="zone-cb h-4 w-4 text-indigo-600 border-gray-300 rounded" value="REGIONAL"><span>REGIONAL</span></label>

                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" class="zone-cb h-4 w-4 text-indigo-600 border-gray-300 rounded" value="NORTH"><span>NORTH</span></label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" class="zone-cb h-4 w-4 text-indigo-600 border-gray-300 rounded" value="METRO"><span>METRO</span></label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" class="zone-cb h-4 w-4 text-indigo-600 border-gray-300 rounded" value="ROI"><span>ROI</span></label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" class="zone-cb h-4 w-4 text-indigo-600 border-gray-300 rounded" value="EAST"><span>EAST</span></label>
                        </div>
                    </div>
                    <div class="mt-8 text-center"><button type="submit" id="submitButton" class="btn px-8 py-3 flex items-center justify-center mx-auto disabled:opacity-45"><span id="buttonText">Submit New Carrier</span><div id="spinner" class="spinner hidden ml-3"></div></button></div>
                </form>
                <div id="responseMessage" class="mt-6 text-center p-4 rounded-lg text-sm hidden"></div>
            </div>
        </main>
    </div>
    
    <div id="deleteConfirmationModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Confirm Deletion</h2>
            <p class="text-gray-600 mb-6">Are you sure you want to delete carrier <strong id="carrierNameToDelete"></strong>? This action cannot be undone.</p>
            <div class="flex justify-end space-x-4">
                <button id="cancelDeleteBtn" class="btn-ghost px-4 py-2">Cancel</button>
                <button id="confirmDeleteBtn" class="btn-danger px-4 py-2">Yes, Delete</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder" class="mt-auto" style="min-height:26px"><div class="animate-pulse bg-gray-200 h-7 w-full"></div></div>

    
    <script src="core/indexeddb.js"></script>
    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZOoT6tp9XVgXiOdiiUL9wWchgGqdBPoTI9BiuT2HyKBIuFzPKPZI4z3kF1IAYBgpn/exec';
        let pincodeTimeout;
        let allCarriers = [];
        let isUpdateMode = false;

        const ui = {
            form: document.getElementById('carrierForm'),
            submitButton: document.getElementById('submitButton'),
            buttonText: document.getElementById('buttonText'),
            spinner: document.getElementById('spinner'),
            responseMessage: document.getElementById('responseMessage'),
            carrierList: document.getElementById('carrierList'),
            searchCarrierInput: document.getElementById('searchCarrier'),
            newCarrierBtn: document.getElementById('newCarrierBtn'),
            companyCodeInput: document.getElementById('companyCode'),
            deleteCarrierBtn: document.getElementById('deleteCarrierBtn'),
            deleteModal: document.getElementById('deleteConfirmationModal'),
            carrierNameToDelete: document.getElementById('carrierNameToDelete'),
            cancelDeleteBtn: document.getElementById('cancelDeleteBtn'),
            confirmDeleteBtn: document.getElementById('confirmDeleteBtn'),
            carrierListContainer: document.getElementById('carrierListContainer'),
            carrierFormContainer: document.getElementById('carrierFormContainer'),
            backToListBtn: document.getElementById('backToListBtn'),
            companyPincodeInput: document.getElementById('companyPincode'),
            companyCityInput: document.getElementById('companyCity'),
            companyStateInput: document.getElementById('companyState'),
            pincodeStatus: document.getElementById('pincodeStatus')
        };
        
        const isMobileView = () => window.innerWidth < 768;

        const showFormView = () => {
            if (isMobileView()) {
                ui.carrierListContainer.classList.add('hidden');
                ui.carrierFormContainer.classList.remove('hidden', 'md:block');
                ui.carrierFormContainer.classList.add('block');
            }
        };

        const showListView = () => {
            if (isMobileView()) {
                ui.carrierListContainer.classList.remove('hidden');
                ui.carrierFormContainer.classList.add('hidden');
            }
        };

        const handleDataLoaded = (event) => {
            if (!event.detail || !event.detail.data || !event.detail.data.CARRIERS) {
                document.getElementById('carrierLoader').textContent = 'No carriers found.';
                return;
            };
            allCarriers = Object.values(event.detail.data.CARRIERS);
            renderCarrierList(allCarriers);
            // Populate MODES checklist from appData if available
            if (event.detail.data.MODES) _populateModesChecklist(Object.values(event.detail.data.MODES));
        };
        window.addEventListener('appDataLoaded', handleDataLoaded);
        window.addEventListener('appDataRefreshed', handleDataLoaded);

        const renderCarrierList = (carriers) => {
            ui.carrierList.innerHTML = '';
            if (!carriers || carriers.length === 0) {
                ui.carrierList.innerHTML = '<li class="text-center text-gray-500">No matching carriers.</li>';
                return;
            }
            carriers.forEach(carrier => {
                const li = document.createElement('li');
                li.className = '';
                li.innerHTML = `<strong>${carrier.COMPANY_CODE}</strong><span class="sv-item-sub">${carrier.COMPANY_NAME || 'Unnamed'}</span>`;
                li.dataset.companyCode = carrier.COMPANY_CODE;
                li.addEventListener('click', () => populateFormForEdit(carrier.COMPANY_CODE));
                ui.carrierList.appendChild(li);
            });
        };

        const populateFormForEdit = (companyCode) => {
            const carrier = allCarriers.find(c => c.COMPANY_CODE === companyCode);
            if (!carrier) return;
            resetForm();
            for (const key in carrier) {
                const input = ui.form.querySelector(`[name="${key}"]`);
                if (input) {
                    input.value = carrier[key] || '';
                }
            }
            // Populate MODES checkboxes
            _populateModesChecklist();
            const modesArr = _parseJsonField(carrier.MODES);
            if (Array.isArray(modesArr)) {
                modesArr.forEach(m => {
                    const cb = document.querySelector(`#modesChecklist input[value="${m}"]`);
                    if (cb) cb.checked = true;
                });
            }
            // Populate ZONES checkboxes
            const zonesArr = _parseJsonField(carrier.ZONES);
            if (Array.isArray(zonesArr)) {
                zonesArr.forEach(z => {
                    const cb = document.querySelector(`#zonesChecklist input[value="${z}"]`);
                    if (cb) cb.checked = true;
                });
            }
            isUpdateMode = true;
            ui.companyCodeInput.readOnly = true;
            ui.companyCodeInput.classList.add('bg-gray-200', 'cursor-not-allowed');
            ui.buttonText.textContent = `Update Carrier ${companyCode}`;
            ui.deleteCarrierBtn.classList.remove('hidden');
            showFormView();
        };

        // Helper: parse JSON string/array field from Supabase
        function _parseJsonField(val) {
            if (Array.isArray(val)) return val;
            if (typeof val === 'string') {
                try { const parsed = JSON.parse(val); return Array.isArray(parsed) ? parsed : []; }
                catch (_) { return []; }
            }
            return [];
        }

        // Populate MODES checklist from appData.MODES collection
        function _populateModesChecklist(modesList) {
            const wrap = document.getElementById('modesChecklist');
            if (!wrap) return;
            // Get modes from appData if not passed in
            if (!modesList) {
                try {
                    const appData = JSON.parse(localStorage.getItem('appData') || '{}');
                    modesList = appData.MODES ? Object.values(appData.MODES) : [];
                } catch (_) { modesList = []; }
            }
            if (!modesList || !modesList.length) {
                wrap.innerHTML = '<span class="text-xs text-gray-400 col-span-full">No modes available</span>';
                return;
            }
            wrap.innerHTML = modesList.map(mode => `
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox" class="mode-cb h-4 w-4 text-indigo-600 border-gray-300 rounded" value="${mode.MODE || mode.SHORT}">
                    <span>${mode.MODE || mode.SHORT}</span>
                </label>
            `).join('');
        }

        const resetForm = () => {
            ui.form.reset();
            isUpdateMode = false;
            ui.companyCodeInput.readOnly = false;
            ui.companyCodeInput.classList.remove('bg-gray-200', 'cursor-not-allowed');
            ui.buttonText.textContent = 'Submit New Carrier';
            ui.deleteCarrierBtn.classList.add('hidden');
            ui.pincodeStatus.innerHTML = '';
            ui.responseMessage.classList.add('hidden');
            // Uncheck all MODES and ZONES checkboxes
            document.querySelectorAll('#modesChecklist input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('#zonesChecklist input[type="checkbox"]').forEach(cb => cb.checked = false);
        };

        ui.searchCarrierInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredCarriers = allCarriers.filter(carrier => 
                (carrier.COMPANY_CODE || '').toLowerCase().includes(searchTerm) || 
                (carrier.COMPANY_NAME || '').toLowerCase().includes(searchTerm)
            );
            renderCarrierList(filteredCarriers);
        });

        ui.newCarrierBtn.addEventListener('click', () => {
            resetForm();
            showFormView();
        });

        ui.backToListBtn.addEventListener('click', () => {
            resetForm();
            showListView();
        });

        ui.companyPincodeInput.addEventListener('input', () => {
            clearTimeout(pincodeTimeout);
            ui.pincodeStatus.innerHTML = '';
            const pincode = ui.companyPincodeInput.value.trim();
            if (pincode.length < 6) { 
                ui.companyCityInput.value = '';
                ui.companyStateInput.value = '';
            }
            if (pincode.length === 6) {
                ui.pincodeStatus.innerHTML = '<div class="spinner field-spinner"></div>';
                pincodeTimeout = setTimeout(() => fetchPincodeDetails(pincode), 500);
            }
        });

        ui.deleteCarrierBtn.addEventListener('click', () => {
            const companyCode = ui.companyCodeInput.value;
            ui.carrierNameToDelete.textContent = `${companyCode}`;
            ui.deleteModal.classList.remove('hidden');
        });

        ui.cancelDeleteBtn.addEventListener('click', () => ui.deleteModal.classList.add('hidden'));
        ui.confirmDeleteBtn.addEventListener('click', () => handleRequest('delete'));

        async function fetchPincodeDetails(pincode) {
            try {
                const response = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
                if (!response.ok) throw new Error('Network response was not ok.');
                const result = await response.json();
                if (result && result[0] && result[0].Status === 'Success') {
                    const postOfficeData = result[0].PostOffice[0];
                    ui.companyCityInput.value = postOfficeData.District || '';
                    ui.companyStateInput.value = postOfficeData.State || '';
                    ui.pincodeStatus.innerHTML = '<span class="text-green-500">✔</span>';
                } else {
                    ui.pincodeStatus.innerHTML = '<span class="text-red-500">✖</span>';
                }
            } catch (error) {
                console.error("Pincode fetch error:", error);
                ui.pincodeStatus.innerHTML = '<span class="text-red-500">!</span>';
            }
        }

        ui.form.addEventListener('submit', (e) => {
            e.preventDefault();
            handleRequest('submit');
        });
        
        async function handleRequest(action) {
            setLoading(true);
            if (!isLoggedIn()) {
                showResponseMessage('Authentication error. Please log in again.', 'error');
                setLoading(false); return;
            }
            const auth = { code: getUser().CODE, token: getSessionId() };

            const data = {};
            if (action === 'submit') {
                 new FormData(ui.form).forEach((value, key) => { data[key] = value; });
                 // Collect MODES checkboxes as JSON array
                 const modesArr = [];
                 document.querySelectorAll('#modesChecklist input[type="checkbox"]:checked').forEach(cb => modesArr.push(cb.value));
                 data.MODES = modesArr.length ? modesArr : [];
                 // Collect ZONES checkboxes as JSON array
                 const zonesArr = [];
                 document.querySelectorAll('#zonesChecklist input[type="checkbox"]:checked').forEach(cb => zonesArr.push(cb.value));
                 data.ZONES = zonesArr.length ? zonesArr : [];
            } else if (action === 'delete') {
                data.COMPANY_CODE = ui.companyCodeInput.value;
            }
            
            const payload = { auth, data, action, type: 'carrier' };

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'cors' });
                if (!response.ok) throw new Error(`Network response error. Status: ${response.status}`);
                const result = await response.json();
                if (result.error) throw new Error(result.message);
                
                showResponseMessage(result.message, 'success', result.data);
                if (ui.deleteModal) ui.deleteModal.classList.add('hidden');
                resetForm();
                showListView();
                
            } catch (error) {
                showResponseMessage(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
        
        function setLoading(isLoading) {
            ui.spinner.classList.toggle('hidden', !isLoading);
            ui.submitButton.disabled = isLoading;
            ui.confirmDeleteBtn.disabled = isLoading;
            const currentActionText = isUpdateMode ? `Update Carrier ${ui.companyCodeInput.value}` : 'Submit New Carrier';
            ui.buttonText.textContent = isLoading ? (isUpdateMode ? 'Updating...' : 'Submitting...') : currentActionText;
        }

        function showResponseMessage(message, type, data = null) {
            let content = `<p class="font-semibold">${message}</p>`;
            if (data && typeof data === 'object') {
                content += '<div class="mt-2 text-left text-xs bg-gray-50 p-3 rounded border border-gray-200 max-w-md mx-auto">';
                for (const [key, value] of Object.entries(data)) {
                    if (value) {
                       content += `<p><strong class="font-medium text-gray-600">${key.replace(/_/g, ' ')}:</strong> <span class="text-gray-800">${value}</span></p>`;
                    }
                }
                content += '</div>';
            }
            
            ui.responseMessage.innerHTML = content;
            ui.responseMessage.className = `mt-6 text-center p-4 rounded-lg text-sm ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            ui.responseMessage.classList.remove('hidden');
        }

        const appDataJSON = localStorage.getItem('appData');
        if (appDataJSON) {
            try {
                const appData = JSON.parse(appDataJSON);
                if (appData && appData.CARRIERS) {
                    allCarriers = Object.values(appData.CARRIERS);
                    renderCarrierList(allCarriers);
                } else {
                     document.getElementById('carrierLoader').textContent = 'No carriers found.';
                }
                // Populate MODES checklist from appData
                if (appData && appData.MODES) {
                    _populateModesChecklist(Object.values(appData.MODES));
                }
            } catch (e) {
                 document.getElementById('carrierLoader').textContent = 'Could not load carriers.';
            }
        }
    });
    </script>
</body>
</html>
