<!-- This is a partial file. It contains only the footer content. -->
<footer class="w-full text-white shadow-md" style="background-color: #9C2007;">
    <div class="flex flex-col sm:flex-row items-center justify-between py-2 px-6 max-w-7xl mx-auto">
        <p id="copyright-text" class="text-center sm:text-left text-sm w-full"></p>
    </div>
</footer>

<script>
    window.addEventListener('footerLoaded', function() {
        if (window.CONSTANTS) {
            const copyrightEl = document.getElementById('copyright-text');
            if (copyrightEl) copyrightEl.textContent = window.CONSTANTS.COPYRIGHT_TEXT;
            const emailEl = document.getElementById('contact-email');
            if (emailEl && window.CONSTANTS.SUPPORT_EMAIL !== 'support@example.com') {
                emailEl.textContent = window.CONSTANTS.SUPPORT_EMAIL;
            }
        }
    });
</script>
