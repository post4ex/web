<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Shipment</title>
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <main class="w-full flex-grow p-4 sm:p-8">
        <div class="container mx-auto max-w-4xl">
            <div class="card">
                <h2 class="text-lg font-bold text-gray-700 mb-4">Track Shipment</h2>

                <div class="flex gap-3 mb-6">
                    <input type="text" id="searchInput" placeholder="Enter AWB or Reference Number"
                        class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-700 text-sm font-semibold">
                    <button id="searchButton"
                        class="px-6 py-3 bg-blue-800 text-white font-bold rounded-lg hover:bg-blue-900 transition-colors text-sm whitespace-nowrap">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i> Track
                    </button>
                </div>

                <div id="loadingIndicator" class="hidden text-center py-6">
                    <i class="fa-solid fa-circle-notch fa-spin text-blue-800 text-2xl"></i>
                    <p class="text-xs mt-2 text-gray-500">Fetching tracking data...</p>
                </div>

                <div id="messageBox" class="hidden p-3 rounded-lg text-sm font-semibold text-center mb-4"></div>

                <div id="resultsContainer" class="hidden"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder" class="mt-auto" style="min-height:36px"><div class="animate-pulse bg-gray-200 h-10 w-full"></div></div>

    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="indexeddb.js"></script>
    <script src="core/layout.js"></script>
    <script src="jawaS/tracking.js"></script>
</body>
</html>
