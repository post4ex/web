<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipments</title>
    <link href="style.css" rel="stylesheet">
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <!-- Link to the main site stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Page-specific styles (pruned to remove duplicates from style.css) -->
    <style>
        /* Shipment List (Left Pane) */
        #shipmentList li {
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 1px solid #e5e7eb;
            line-height: 1.4;
        }
        #shipmentList li.selected {
            background-color: #e0e7ff;
            font-weight: 500;
            border-color: #c7d2fe;
        }
        #shipmentList li:hover {
            background-color: #eef2ff;
        }
        #shipmentList li strong {
            color: #4338ca;
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
        }
        #shipmentList .client-info {
            font-size: 0.75rem;
            color: #6b7280;
        }
        #shipmentList .details-info {
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }
        #shipmentList .status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 0.25rem;
            text-transform: uppercase;
        }

        /* Right Pane Details */
        .detail-card {
            background-color: #ffffff;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .detail-card-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            background-color: #f9fafb;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }
        .detail-card-body {
            padding: 1rem;
        }
        /* Tracking history timeline */
        .timeline { position: relative; padding-left: 1.5rem; border-left: 2px solid #e5e7eb; }
        .timeline-item { margin-bottom: 1rem; }
        .timeline-dot {
            position: absolute; left: -0.5rem; top: 0.25rem;
            width: 0.875rem; height: 0.875rem; background-color: #3b82f6;
            border-radius: 50%; border: 2px solid #ffffff;
        }
        .timeline-item:last-child { margin-bottom: 0; }

        /* Table Styles */
        #uploadsTable th, #uploadsTable td,
        #docCenterTable th, #docCenterTable td { padding: 0.5rem; font-size: 0.8rem; }
        #trackingHistoryTable th, #trackingHistoryTable td { padding: 0.5rem; font-size: 0.8rem; }

        /* Form input style from style.css (needed for filter modal) */
        .form-input {
            border-radius: 0.375rem; border: 1px solid #d1d5db; padding: 0.5rem 0.75rem;
            font-size: 0.875rem; width: 100%; transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 1px #4f46e5; }

    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">
    <!-- Header placeholder -->
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <!-- Main content container -->
    <div class="flex flex-col md:flex-row flex-grow w-full min-h-0">

        <!-- Left Sidebar for Shipment List -->
        <aside id="shipmentListPane" class="w-full md:w-1/3 lg:w-1/4 bg-white border-r flex flex-col flex-grow md:flex-grow-0 min-h-0">
            <div class="p-4 border-b sticky top-0 bg-white z-10">
                <h2 class="text-xl font-bold text-gray-800 mb-3">Shipments</h2>
                <div class="flex gap-2">
                    <input type="text" id="searchShipments" placeholder="Search AWB, Ref, Client..." class="form-input w-full text-sm">
                    <button id="filterToggleBtn" class="p-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                    </button>
                </div>
            </div>
            <div id="shipmentListContainer" class="overflow-y-auto flex-grow min-h-0">
                <p id="status-message" class="text-gray-600 p-4 text-center">Loading shipment data...</p>
                <ul id="shipmentList" class="p-4 space-y-2">
                    <!-- Shipment list items will be rendered here -->
                </ul>
            </div>
        </aside>

        <!-- Main Content Area for Details -->
        <main id="shipmentDetailPane" class="w-full md:w-2/3 lg:w-3/4 p-6 md:p-8 overflow-y-auto bg-gray-50 hidden md:block min-h-0">
            <!-- Add Back Button for mobile -->
            <div class="p-4 border-b md:hidden bg-white -mt-6 -mx-6 mb-6 sm:-mt-8 sm:-mx-8 sm:mb-8 shadow-sm">
                 <button type="button" id="backToListBtn" class="text-sm bg-gray-200 text-gray-800 font-semibold py-1 px-3 rounded-lg hover:bg-gray-300 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to List
                </button>
            </div>

            <div id="detailView" class="hidden space-y-6">
                 <!-- NEW ORDER OF SECTIONS -->

                <!-- 1 & 2. Document Center & Shipment Details (Side by Side) -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div id="documentCenterContainer" class="detail-card"></div>
                    <div id="shipmentDetailsContainer" class="detail-card"></div>
                </div>

                <!-- 3 & 4. Party Details (Side by Side) -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div id="consignorDetailsContainer" class="detail-card"></div>
                    <div id="consigneeDetailsContainer" class="detail-card"></div>
                </div>

                <!-- 5. Product & Box Details (Includes Associated Uploads) -->
                <div id="productBoxDetailsContainer" class="detail-card"></div>

                <!-- 6. Tracking Status -->
                <div id="trackingStatusContainer" class="detail-card"></div>

                <!-- 7. Tracking History -->
                <div id="trackingHistoryContainer" class="detail-card"></div>

                <!-- END NEW ORDER -->

            </div>
            <div id="emptyView" class="h-full flex items-center justify-center">
                <p class="text-gray-500 text-lg">Select a shipment from the list to view details.</p>
            </div>
        </main>
    </div>

    <!-- Filter Modal (uses modal styles from style.css) -->
    <div id="filterModal" class="modal-overlay hidden">
        <div class="modal-content space-y-4">
            <h2 class="text-xl font-semibold text-gray-800">Filter Shipments</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="filter-start-date" class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" id="filter-start-date" class="form-input mt-1 block w-full text-sm">
                </div>
                <div>
                    <label for="filter-end-date" class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" id="filter-end-date" class="form-input mt-1 block w-full text-sm">
                </div>
                <div>
                    <label for="filter-branch" class="block text-sm font-medium text-gray-700">Branch</label>
                    <select id="filter-branch" class="form-input mt-1 block w-full text-sm">
                        <option value="">All</option>
                    </select>
                </div>
                <div>
                    <label for="filter-code" class="block text-sm font-medium text-gray-700">Code</label>
                    <select id="filter-code" class="form-input mt-1 block w-full text-sm">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="sm:col-span-2">
                    <label for="filter-carrier" class="block text-sm font-medium text-gray-700">Carrier</label>
                    <select id="filter-carrier" class="form-input mt-1 block w-full text-sm">
                        <option value="">All</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-4 pt-4 border-t">
                <button id="reset-filters" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300 text-sm font-medium">Reset</button>
                <button id="apply-filters" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm font-medium">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- Footer placeholder -->
    <div id="footer-placeholder" class="mt-auto" style="min-height:36px"><div class="animate-pulse bg-gray-200 h-10 w-full"></div></div>

    <!-- 
      *** CRITICAL FIX: Ensure external scripts are loaded before the main inline script. ***
    -->
    <script src="jawaS/docgen.js"></script>
    
    <script src="indexeddb.js"></script>
    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    
    <script>
        // --- GLOBAL STATE ---
        let allOrders = [];
        let currentSelectedRef = null;
        let b2b2cDataMap  = new Map(); // UID → B2B2C record
        let productDataMap  = new Map(); // REFERENCE → [products]
        let multiboxDataMap = new Map(); // REFERENCE → [boxes]
        let uploadsDataMap  = new Map(); // REFERENCE → [uploads]
        let modesDataMap    = new Map(); // SHORT → MODE name
        let carriersDataMap = new Map(); // COMPANY_CODE → COMPANY_NAME

        document.addEventListener('DOMContentLoaded', () => {
             // --- DOM Elements ---
            const ui = {
                statusMessage: document.getElementById('status-message'),
                shipmentList: document.getElementById('shipmentList'),
                shipmentListPane: document.getElementById('shipmentListPane'), 
                shipmentDetailPane: document.getElementById('shipmentDetailPane'), 
                backToListBtn: document.getElementById('backToListBtn'), 
                searchShipments: document.getElementById('searchShipments'),
                filterToggleBtn: document.getElementById('filterToggleBtn'),
                filterModal: document.getElementById('filterModal'),
                filterStartDate: document.getElementById('filter-start-date'),
                filterEndDate: document.getElementById('filter-end-date'),
                filterBranch: document.getElementById('filter-branch'),
                filterCode: document.getElementById('filter-code'),
                filterCarrier: document.getElementById('filter-carrier'),
                resetFiltersBtn: document.getElementById('reset-filters'),
                applyFiltersBtn: document.getElementById('apply-filters'),
                detailView: document.getElementById('detailView'),
                emptyView: document.getElementById('emptyView'),
                // Detail Pane Containers
                shipmentDetailsContainer: document.getElementById('shipmentDetailsContainer'),
                trackingStatusContainer: document.getElementById('trackingStatusContainer'),
                consignorDetailsContainer: document.getElementById('consignorDetailsContainer'),
                consigneeDetailsContainer: document.getElementById('consigneeDetailsContainer'),
                productBoxDetailsContainer: document.getElementById('productBoxDetailsContainer'),
                trackingHistoryContainer: document.getElementById('trackingHistoryContainer'),
                documentCenterContainer: document.getElementById('documentCenterContainer')
            };

            // --- Mobile View Functions ---
            const isMobileView = () => window.innerWidth < 768;

            const showDetailView = () => {
                if (isMobileView()) {
                    ui.shipmentListPane.classList.add('hidden');
                    ui.shipmentDetailPane.classList.remove('hidden');
                }
                ui.emptyView.classList.add('hidden');
                ui.detailView.classList.remove('hidden');
            };
            
            // Add listener for back button
            ui.backToListBtn.addEventListener('click', () => {
                if (isMobileView()) {
                    ui.shipmentListPane.classList.remove('hidden');
                    ui.shipmentDetailPane.classList.add('hidden');
                }
            });
            // --- END Mobile View Functions ---

            // --- Data Initialization ---
            function initializePageWithData(appData) {
                if (!appData || !appData.ORDERS) {
                    ui.statusMessage.textContent = 'No shipment data found.';
                    return;
                }
                try {
                    // ORDERS comes back as { REFERENCE: record } object from IndexedDB
                    allOrders = Object.values(appData.ORDERS);
                    allOrders.sort((a, b) => new Date(b.ORDER_DATE) - new Date(a.ORDER_DATE));

                    b2b2cDataMap.clear(); productDataMap.clear(); multiboxDataMap.clear();
                    uploadsDataMap.clear(); modesDataMap.clear(); carriersDataMap.clear();

                    if (appData.B2B2C)
                        Object.values(appData.B2B2C).forEach(c => b2b2cDataMap.set(c.UID, c));

                    if (appData.PRODUCTS)
                        Object.values(appData.PRODUCTS).forEach(p => {
                            const r = p.REFERENCE;
                            if (!r) return;
                            if (!productDataMap.has(r)) productDataMap.set(r, []);
                            productDataMap.get(r).push(p);
                        });

                    if (appData.MULTIBOX)
                        Object.values(appData.MULTIBOX).forEach(b => {
                            const r = b.REFERENCE;
                            if (!r) return;
                            if (!multiboxDataMap.has(r)) multiboxDataMap.set(r, []);
                            multiboxDataMap.get(r).push(b);
                        });

                    if (appData.UPLOADS)
                        Object.values(appData.UPLOADS).forEach(u => {
                            const r = u.REFERENCE;
                            if (!r) return;
                            if (!uploadsDataMap.has(r)) uploadsDataMap.set(r, []);
                            uploadsDataMap.get(r).push(u);
                        });

                    if (appData.MODES)
                        Object.values(appData.MODES).forEach(m => modesDataMap.set(m.SHORT, m.MODE));

                    if (appData.CARRIERS)
                        Object.values(appData.CARRIERS).forEach(c => carriersDataMap.set(c.COMPANY_CODE, c.COMPANY_NAME));

                    populateFilters(allOrders);
                    setupFilterListeners();
                    applyFilters();
                    ui.statusMessage.textContent = '';
                } catch (err) {
                    ui.statusMessage.textContent = 'Failed to process data.';
                    console.error('Data processing error:', err);
                }
            }

            // Listen for sync events from layout.js
            window.addEventListener('appDataLoaded',    e => initializePageWithData(e.detail.data));
            window.addEventListener('appDataRefreshed', e => initializePageWithData(e.detail.data));

            // Load immediately from IndexedDB on page open
            async function loadFromIndexedDB() {
                try {
                    await new Promise(resolve => {
                        if (window.appDB && window.appDB.db) return resolve();
                        window.addEventListener('indexedDBReady', resolve, { once: true });
                        setTimeout(resolve, 5000);
                    });
                    const appData = await getAppData();
                    if (appData && appData.ORDERS && Object.keys(appData.ORDERS).length > 0) {
                        initializePageWithData(appData);
                    } else {
                        ui.statusMessage.textContent = 'No data yet — syncing...';
                    }
                } catch (err) {
                    ui.statusMessage.textContent = 'Error loading data.';
                    console.error(err);
                }
            }
            loadFromIndexedDB();

            // --- Filter Modal & Search Logic ---
            function populateFilters(orders) {
                // Clear existing options except the first "All" option
                ui.filterBranch.length = 1; ui.filterCode.length = 1; ui.filterCarrier.length = 1;
                
                const branches = [...new Set(orders.map(o => o.BRANCH).filter(Boolean))];
                const codes = [...new Set(orders.map(o => o.CODE).filter(Boolean))];
                const carriers = [...new Set(orders.map(o => o.CARRIER).filter(Boolean))];
                
                branches.sort().forEach(val => ui.filterBranch.add(new Option(val, val)));
                codes.sort().forEach(val => ui.filterCode.add(new Option(val, val)));
                carriers.sort().forEach(val => ui.filterCarrier.add(new Option(val, val)));
            }

            function setupFilterListeners() {
                ui.searchShipments.addEventListener('input', applyFilters);
                ui.filterToggleBtn.addEventListener('click', () => ui.filterModal.classList.remove('hidden'));
                ui.applyFiltersBtn.addEventListener('click', () => { applyFilters(); ui.filterModal.classList.add('hidden'); });
                ui.resetFiltersBtn.addEventListener('click', () => { 
                    ui.filterStartDate.value = ''; ui.filterEndDate.value = ''; 
                    ui.filterBranch.value = ''; ui.filterCode.value = ''; ui.filterCarrier.value = ''; 
                    applyFilters(); 
                });
                // Close modal on overlay click
                ui.filterModal.addEventListener('click', (e) => { if (e.target === ui.filterModal) ui.filterModal.classList.add('hidden'); });
            }

            function applyFilters() {
                let startDate = ui.filterStartDate.value; let endDate = ui.filterEndDate.value;
                const branch = ui.filterBranch.value; const code = ui.filterCode.value; const carrier = ui.filterCarrier.value;
                const searchTerm = ui.searchShipments.value.toLowerCase();

                const isAnyFilterApplied = startDate || endDate || branch || code || carrier || searchTerm;
                let statusText = `Displaying {count} of ${allOrders.length} records.`;
                
                // Default date filter logic
                if (!isAnyFilterApplied && !startDate) {
                    const today = new Date(); const currentDay = today.getDate(); let firstDay;
                    if (currentDay <= 10 && today.getMonth() > 0) { // If before 10th and not Jan, go to 1st of last month
                        firstDay = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                    } else if (currentDay <= 10 && today.getMonth() === 0) { // If before 10th and in Jan, go to Dec 1st of last year
                        firstDay = new Date(today.getFullYear() - 1, 11, 1);
                    } else { // Otherwise, 1st of current month
                        firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                    }
                    startDate = firstDay.toISOString().split('T')[0]; // Format as YYYY-MM-DD
                    statusText = `Displaying {count} of ${allOrders.length} records (default view from ${startDate}).`;
                }

                const filteredOrders = allOrders.filter(order => {
                    const orderDate = order.ORDER_DATE ? new Date(order.ORDER_DATE) : null; if (!orderDate) return false;
                    
                    let sdMatch = true; if (startDate) sdMatch = orderDate >= new Date(startDate + 'T00:00:00Z');
                    let edMatch = true; if (endDate) edMatch = orderDate <= new Date(endDate + 'T23:59:59Z');
                    
                    const bMatch = !branch || order.BRANCH === branch; 
                    const cMatch = !code || order.CODE === code; 
                    const carMatch = !carrier || order.CARRIER === carrier;
                    
                    const cnorName = (order.CONSIGNOR || '').toLowerCase();
                    const cneeName = (order.CONSIGNEE || '').toLowerCase();
                
                const sMatch = !searchTerm || 
                                   (order.REFERENCE ? String(order.REFERENCE).toLowerCase().includes(searchTerm) : false) || 
                                   (order.AWB_NUMBER ? String(order.AWB_NUMBER).toLowerCase().includes(searchTerm) : false) || 
                                   cnorName.includes(searchTerm) || 
                                   cneeName.includes(searchTerm);
                                   
                    return sdMatch && edMatch && bMatch && cMatch && carMatch && sMatch;
                });

                renderShipmentList(filteredOrders);
                
                if(ui.statusMessage) ui.statusMessage.textContent = statusText.replace('{count}', filteredOrders.length);
                else console.log(statusText.replace('{count}', filteredOrders.length));
                
                // --- NEW Mobile/Desktop View Logic ---
                if (isMobileView()) {
                    // On mobile, filtering *always* returns you to the list view
                    ui.shipmentListPane.classList.remove('hidden');
                    ui.shipmentDetailPane.classList.add('hidden');
                    
                    // If the selected item is no longer in view, clear the ref
                    if (currentSelectedRef && !filteredOrders.find(o => o.REFERENCE === currentSelectedRef)) {
                        currentSelectedRef = null;
                    }
                    // The 'selected' class will be added (or not) by renderShipmentList
                    
                } else {
                    // On desktop, check if selected item is still valid
                    if (currentSelectedRef) {
                        const currentOrder = filteredOrders.find(o => o.REFERENCE === currentSelectedRef);
                        if (currentOrder) {
                            handleShipmentSelection(currentSelectedRef, ui.shipmentList.querySelector(`li[data-ref="${currentSelectedRef}"]`));
                        } else {
                            // If not found, clear selection and show empty view
                            currentSelectedRef = null;
                            ui.emptyView.classList.remove('hidden');
                            ui.detailView.classList.add('hidden');
                        }
                    } else { // If no item was selected, make sure details pane is hidden
                        ui.emptyView.classList.remove('hidden');
                        ui.detailView.classList.add('hidden');
                    }
                }
            }

            // --- Render Shipment List (Left Pane) ---
            function renderShipmentList(orders) {
                ui.shipmentList.innerHTML = '';
                if (orders.length === 0) { 
                    ui.shipmentList.innerHTML = `<li class="text-center text-gray-500 border-none hover:bg-transparent cursor-default">No orders match filters.</li>`; 
                    return; 
                }
                
                orders.forEach((order) => {
                    const ref = order.REFERENCE; if (!ref) return;
                    const awb = order.AWB_NUMBER || 'No AWB';
                    const cnor = order.CONSIGNOR || 'Unknown';
                    const cnee = order.CONSIGNEE || 'Unknown';
                    
                    const dt = fmtDate(order.ORDER_DATE);
                    
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${awb}</strong><span class="client-info">${cnor} → ${cnee}</span><div class="details-info"><span>Ref: ${ref} | ${dt}</span></div>`;
                    li.dataset.ref = ref;
                    li.addEventListener('click', () => handleShipmentSelection(ref, li));
                    if (String(ref) === String(currentSelectedRef)) li.classList.add('selected');
                    ui.shipmentList.appendChild(li);
                });
            }

            // --- Selection Handler ---
            function handleShipmentSelection(ref, selectedLi) {
                currentSelectedRef = ref;
                
                // Update selected styles in the list
                ui.shipmentList.querySelectorAll('li.selected').forEach(li => li.classList.remove('selected'));
                if (selectedLi) selectedLi.classList.add('selected');
                
                const order = allOrders.find(o => o.REFERENCE === ref);
                if (!order) { 
                    ui.emptyView.classList.remove('hidden'); 
                    ui.detailView.classList.add('hidden'); 
                    return; 
                }
                
                // --- Call render functions in the CORRECT ORDER ---
                renderDocumentCenter(order); // 1st
                renderShipmentDetails(order); // 2nd
                renderPartyDetails('Consignor', order.CONSIGNOR, order.ORIGIN_CITY, order.ORIGIN_PINCODE, '', '', ui.consignorDetailsContainer);
                renderPartyDetails('Consignee', order.CONSIGNEE, order.DEST_CITY,   order.DEST_PINCODE,   '', '', ui.consigneeDetailsContainer);
                renderProductAndBoxDetails(order); // 5th

                // --- ADDED: Event listener for the new toggle button ---
                const toggleBtn = document.getElementById('toggleUploadsBtn');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', () => {
                        const uploadsDiv = document.getElementById('uploadsContainer');
                        const icon = toggleBtn.querySelector('svg');
                        
                        if (uploadsDiv && uploadsDiv.classList.toggle('hidden')) {
                            // It's now hidden
                            toggleBtn.childNodes[0].nodeValue = "Show Uploads "; // Access the text node
                            if (icon) icon.classList.remove('rotate-180');
                        } else {
                            // It's now visible
                            toggleBtn.childNodes[0].nodeValue = "Hide Uploads "; // Access the text node
                            if (icon) icon.classList.add('rotate-180');
                        }
                    });
                }
                // --- END ADDITION ---

                renderTrackingStatus(order); // 6th
                renderTrackingHistory(order); // 7th
                // --- End correct order call ---
                
                showDetailView(); // MODIFIED: Call new function
            }

            // --- Render Functions for Right Pane ---



            function renderShipmentDetails(order) {
                const carrier = carriersDataMap.get(order.CARRIER) || order.CARRIER || 'N/A';
                const mode    = modesDataMap.get(order.MODE) || order.MODE || 'N/A';
                const d = [
                    {l:'Carrier',  v:carrier},          {l:'Mode',     v:mode},
                    {l:'TAT',      v:order.TAT},         {l:'Zone',     v:order.ZONE},
                    {l:'Wt(kg)',   v:order.WEIGHT},      {l:'ChgWt(kg)',v:order.CHG_WT},
                    {l:'Pcs',      v:order.PIECS},       {l:'Value',    v:order.VALUE},
                    {l:'COD',      v:order.COD},         {l:'ToPay',    v:order.TOPAY},
                    {l:'FOV',      v:order.FOV},         {l:'Global',   v:order.GLOBAL}
                ];
                let h = `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm">`;
                d.forEach(i => {
                    if (i.v !== undefined && i.v !== null && i.v !== '')
                        h += `<div><div class="text-gray-500 text-xs">${i.l}</div><div class="font-semibold text-gray-800">${i.v}</div></div>`;
                });
                h += `</div>`;
                ui.shipmentDetailsContainer.innerHTML = `<div class="detail-card-header"><h3 class="font-semibold text-gray-700">Shipment Details</h3></div><div class="detail-card-body">${h}</div>`;
            }

            function renderTrackingStatus(order) {
                // No TRACK collection in PB — show order dates as status summary
                const transitDate  = fmtDate(order.TRANSIT_DATE);
                const orderDate    = fmtDate(order.ORDER_DATE);
                const invoiceDate  = fmtDate(order.INVOICE_DATE);
                const h = `<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm">
                    <div><div class="text-gray-500 text-xs">Order Date</div><div class="font-semibold text-gray-800">${orderDate}</div></div>
                    <div><div class="text-gray-500 text-xs">Transit Date</div><div class="font-semibold text-gray-800">${transitDate}</div></div>
                    <div><div class="text-gray-500 text-xs">Invoice Date</div><div class="font-semibold text-gray-800">${invoiceDate}</div></div>
                </div>`;
                ui.trackingStatusContainer.innerHTML = `<div class="detail-card-header flex justify-between items-center">
                    <h3 class="font-semibold text-gray-700">Tracking Status</h3>
                    <div class="flex gap-2">
                        <button class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200">TICKET</button>
                        <button class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200">MARK</button>
                    </div>
                </div><div class="detail-card-body">${h}</div>`;
            }

            function renderPartyDetails(label, name, city, pincode, state, mobile, container) {
                const d = [
                    {l:'Name',    v:name},   {l:'City',   v:city},
                    {l:'Pincode', v:pincode},{l:'State',  v:state},
                    {l:'Mobile',  v:mobile}
                ];
                let h = `<div class="space-y-2 text-sm">`;
                d.forEach(i => {
                    if (i.v) h += `<div class="flex justify-between"><span class="text-gray-500">${i.l}:</span><span class="font-medium text-right">${i.v}</span></div>`;
                });
                h += `</div>`;
                container.innerHTML = `<div class="detail-card-header"><h3 class="font-semibold text-gray-700">${label} Details</h3></div><div class="detail-card-body">${h}</div>`;
            }

            function renderProductAndBoxDetails(order) {
                const r = order.REFERENCE;
                const p = productDataMap.get(r)  || [];
                const b = multiboxDataMap.get(r) || [];
                const u = uploadsDataMap.get(r)  || []; 
                let h_body = '';
                
                if (p.length === 0 && b.length === 0 && u.length === 0) {
                    h_body = `<p class="text-sm text-gray-500">No product, box, or upload details.</p>`;
                } else { 
                    h_body = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
                    
                    // --- Product Section ---
                    if (p.length > 0) { 
                        h_body += `<div><h4 class="font-medium text-sm mb-2 text-gray-600">Product</h4>`;
                        
                        // Product Mobile List
                        h_body += `<div class="space-y-2 text-sm sm:hidden">`;
                        p.forEach(i => {
                            const docNumText = i.DOC_NUMBER || 'N/A';
                            const ewayNumText = i.EWAY_IF || 'N/A';
                            const docUpload = u.find(up => up.UPLOAD_TYPE === 'Product' && up.DOC_NUMBER === i.DOC_NUMBER && up.DOC_TYPE && up.DOC_TYPE.toUpperCase() !== 'EWB');
                            // *** MODIFICATION START: Find EWay Bill by EWAY_IF number and check for 'EWB' ***
                            const ewayUpload = u.find(up => up.UPLOAD_TYPE === 'Product' && up.DOC_NUMBER === i.EWAY_IF && up.DOC_TYPE && up.DOC_TYPE.toUpperCase() === 'EWB');
                            // *** MODIFICATION END ***
                            const docCell = docUpload ? `<a href="${docUpload.FILE_URL}" target="_blank" class="text-blue-600 hover:underline">${docNumText}</a>` : docNumText;
                            const ewayCell = ewayUpload ? `<a href="${ewayUpload.FILE_URL}" target="_blank" class="text-blue-600 hover:underline">${ewayNumText}</a>` : ewayNumText;

                            h_body += `<div class="p-3 bg-gray-50 rounded-md border">
                                        <div class="font-semibold text-gray-800">${i.PRODUCT||'N/A'}</div>
                                        <div class="flex justify-between mt-1 pt-1 border-t"><span class="text-gray-500">Doc#:</span><span class="font-medium text-gray-700">${docCell}</span></div>
                                        <div class="flex justify-between mt-1"><span class="text-gray-500">EWay:</span><span class="font-medium text-gray-700">${ewayCell}</span></div>
                                        <div class="flex justify-between mt-1"><span class="text-gray-500">Amt:</span><span class="font-medium text-gray-700">${i.AMOUNT?i.AMOUNT.toFixed(2):'0.00'}</span></div>
                                      </div>`;
                        });
                        h_body += `</div>`;

                        // Product Desktop Table
                        h_body += `<div class="hidden sm:block border rounded-md overflow-hidden"><table class="min-w-full text-xs divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">Product</th><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">Doc#</th><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">EWay</th><th class="px-2 py-1 text-right font-medium text-gray-500 uppercase">Amt</th></tr></thead><tbody class="bg-white divide-y divide-gray-200">`; 
                        p.forEach(i => { 
                            const docNumText = i.DOC_NUMBER || 'N/A';
                            const ewayNumText = i.EWAY_IF || 'N/A';
                            const docUpload = u.find(up => up.UPLOAD_TYPE === 'Product' && up.DOC_NUMBER === i.DOC_NUMBER && up.DOC_TYPE && up.DOC_TYPE.toUpperCase() !== 'EWB');
                            // *** MODIFICATION START: Find EWay Bill by EWAY_IF number and check for 'EWB' ***
                            const ewayUpload = u.find(up => up.UPLOAD_TYPE === 'Product' && up.DOC_NUMBER === i.EWAY_IF && up.DOC_TYPE && up.DOC_TYPE.toUpperCase() === 'EWB');
                            // *** MODIFICATION END ***
                            const docCell = docUpload ? `<a href="${docUpload.FILE_URL}" target="_blank" class="text-blue-600 hover:underline">${docNumText}</a>` : docNumText;
                            const ewayCell = ewayUpload ? `<a href="${ewayUpload.FILE_URL}" target="_blank" class="text-blue-600 hover:underline">${ewayNumText}</a>` : ewayNumText;

                            h_body += `<tr>
                                        <td class="px-2 py-1">${i.PRODUCT||'N/A'}</td>
                                        <td class="px-2 py-1">${docCell}</td>
                                        <td class="px-2 py-1">${ewayCell}</td>
                                        <td class="px-2 py-1 text-right">${i.AMOUNT?i.AMOUNT.toFixed(2):'0.00'}</td>
                                      </tr>`; 
                        }); 
                        h_body += `</tbody></table></div>`; 
                        h_body += `</div>`; 
                    }
                    else h_body += `<div><h4 class="font-medium text-sm mb-2 text-gray-600">Product</h4><p class="text-xs text-gray-500">None</p></div>`;
                    
                    // --- Multibox Section ---
                    if (b.length > 0) {
                        h_body += `<div><h4 class="font-medium text-sm mb-2 text-gray-600">MultiBox</h4>`;

                        // Multibox Mobile List
                        h_body += `<div class="space-y-2 text-sm sm:hidden">`;
                        b.forEach(i => {
                            const l = parseFloat(i.LENGTH) || 0;
                            const br = parseFloat(i.BREADTH) || 0;
                            const ht = parseFloat(i.HIGHT) || 0;
                            const lbhString = `${l}*${br}*${ht}`;
                            h_body += `<div class="p-3 bg-gray-50 rounded-md border">
                                        <div class="font-semibold text-gray-800">Box#: ${i.BOX_NUM || 'N/A'}</div>
                                        <div class="flex justify-between mt-1 pt-1 border-t"><span class="text-gray-500">Weight:</span><span class="font-medium text-gray-700">${i.WEIGHT || 0}</span></div>
                                        <div class="flex justify-between mt-1"><span class="text-gray-500">L*B*H:</span><span class="font-medium text-gray-700">${lbhString}</span></div>
                                        <div class="flex justify-between mt-1"><span class="text-gray-500">Chg Wt:</span><span class="font-medium text-gray-700">${(i.CHG_WT || 0).toFixed(2)}</span></div>
                                      </div>`;
                        });
                        h_body += `</div>`;
                        
                        // Multibox Desktop Table
                        h_body += `<div class="hidden sm:block border rounded-md overflow-hidden">
                                <table class="min-w-full text-xs divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">Weight</th>
                                        <th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">L*B*H</th>
                                        <th class="px-2 py-1 text-right font-medium text-gray-500 uppercase">Chg Wt</th>
                                        <th class="px-2 py-1 text-right font-medium text-gray-500 uppercase">Box#</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">`;
                        b.forEach(i => {
                            const l = parseFloat(i.LENGTH) || 0;
                            const br = parseFloat(i.BREADTH) || 0;
                            const ht = parseFloat(i.HIGHT) || 0;
                            const lbhString = `${l}*${br}*${ht}`;
                            h_body += `<tr>
                                    <td class="px-2 py-1">${i.WEIGHT || 0}</td>
                                    <td class="px-2 py-1">${lbhString}</td>
                                    <td class="px-2 py-1 text-right">${(i.CHG_WT || 0).toFixed(2)}</td>
                                    <td class="px-2 py-1 text-right">${i.BOX_NUM || 'N/A'}</td>
                                  </tr>`;
                        });
                        h_body += `</tbody></table></div>`; 
                        h_body += `</div>`; 
                    }
                    else h_body += `<div><h4 class="font-medium text-sm mb-2 text-gray-600">MultiBox</h4><p class="text-xs text-gray-500">None</p></div>`; 
                    h_body += `</div>`; 
                    
                    // --- Uploads Section ---
                    if (u.length > 0) {
                        h_body += `<div id="uploadsContainer" class="hidden">`; 
                        h_body += `<hr class="my-4"><h4 class="font-medium text-sm mb-2 text-gray-600">Uploads</h4>`;
                        
                        // Uploads Mobile List
                        h_body += `<div class="space-y-2 text-sm sm:hidden">`;
                        u.forEach(up => { 
                            const ud = fmtDate(up.DATE_TIME, 'full'); 
                            let idt = up.AWB_NUMBER || up.KYC_NUMBER || up.REFERENCE; 
                            let det = ''; 
                            if(up.UPLOAD_TYPE==='MultiBox') det=`Child:${up.CHILD_AWB||'N/A'}`; 
                            else if(up.UPLOAD_TYPE==='KYC') det=`${up.CUSTOMER_UID||'N/A'}(${up.KYC_TYPE||'N/A'})`; 
                            else if(up.UPLOAD_TYPE==='Product') det=`${up.DOC_NUMBER||'N/A'}(${up.DOC_TYPE||'N/A'})`; 
                            else det=up.STATUS_REMARK||'N/A';
                            h_body += `<div class="p-3 bg-gray-50 rounded-md border">
                                        <div class="flex justify-between items-center">
                                            <span class="font-semibold text-gray-800">${up.UPLOAD_TYPE||'N/A'}</span>
                                            <a href="${up.FILE_URL}" target="_blank" title="Open" class="p-1.5 bg-gray-500 text-white rounded hover:bg-gray-600 inline-flex"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>
                                        </div>
                                        <div class="flex justify-between mt-1 pt-1 border-t"><span class="text-gray-500">ID:</span><span class="font-medium text-gray-700">${idt||'N/A'}</span></div>
                                        <div class="flex justify-between mt-1"><span class="text-gray-500">Details:</span><span class="font-medium text-gray-700 text-right">${det}</span></div>
                                        <div class="flex justify-between mt-1"><span class="text-gray-500">Date:</span><span class="font-medium text-gray-700">${ud}</span></div>
                                      </div>`;
                        });
                        h_body += `</div>`;

                        // Uploads Desktop Table
                        h_body += `<div class="hidden sm:block overflow-x-auto border rounded-md"><table id="uploadsTable" class="min-w-full text-xs divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left font-medium text-gray-500 uppercase">Type</th><th class="px-4 py-2 text-left font-medium text-gray-500 uppercase">ID</th><th class="px-4 py-2 text-left font-medium text-gray-500 uppercase">Details</th><th class="px-4 py-2 text-left font-medium text-gray-500 uppercase">Date</th><th class="px-4 py-2 text-center font-medium text-gray-500 uppercase">File</th></tr></thead><tbody class="bg-white divide-y divide-gray-200">`;
                        u.forEach(up => { 
                            const ud = fmtDate(up.DATE_TIME, 'full'); 
                            let idt = up.AWB_NUMBER || up.KYC_NUMBER || up.REFERENCE; 
                            let det = ''; 
                            if(up.UPLOAD_TYPE==='MultiBox') det=`Child:${up.CHILD_AWB||'N/A'}`; 
                            else if(up.UPLOAD_TYPE==='KYC') det=`${up.CUSTOMER_UID||'N/A'}(${up.KYC_TYPE||'N/A'})`; 
                            else if(up.UPLOAD_TYPE==='Product') det=`${up.DOC_NUMBER||'N/A'}(${up.DOC_TYPE||'N/A'})`; 
                            else det=up.STATUS_REMARK||'N/A'; 
                            h_body+=`<tr><td class="px-4 py-2">${up.UPLOAD_TYPE||'N/A'}</td><td class="px-4 py-2">${idt||'N/A'}</td><td class="px-4 py-2">${det}</td><td class="px-4 py-2">${ud}</td><td class="px-4 py-2 text-center"><a href="${up.FILE_URL}" target="_blank" title="Open" class="p-1.5 bg-gray-500 text-white rounded hover:bg-gray-600 inline-flex"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a></td></tr>`; 
                        });
                        h_body += `</tbody></table></div>`; 
                        h_body += `</div>`; 
                    }
                    else h_body += `<hr class="my-4"><h4 class="font-medium text-sm mb-2 text-gray-600">Uploads</h4><p class="text-xs text-gray-500">None</p>`
                }
                
                let h_header = `<div class="detail-card-header flex justify-between items-center">
                                    <h3 class="font-semibold text-gray-700">Product, Box & Upload Details</h3>`;
                
                if (u.length > 0) {
                    h_header += `<button id="toggleUploadsBtn" class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200 flex items-center gap-1 transition-all">
                                    Show Uploads 
                                    <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                 </button>`;
                }
                
                h_header += `</div>`; 
                
                ui.productBoxDetailsContainer.innerHTML = `${h_header}<div class="detail-card-body">${h_body}</div>`;
            }

            function renderTrackingHistory(order) {
                // No LOGS collection in PB — placeholder for future tracking updates
                ui.trackingHistoryContainer.innerHTML = `<div class="detail-card-header"><h3 class="font-semibold text-gray-700">Tracking History</h3></div><div class="detail-card-body"><p class="text-sm text-gray-500">Tracking history not available.</p></div>`;
            }

            function renderDocumentCenter(order) {
                const r = order.REFERENCE;
                const uploads  = uploadsDataMap.get(r) || [];
                const receiptUpload = uploads.find(u => u.UPLOAD_TYPE === 'Reciept');
                const podUpload     = uploads.find(u => u.UPLOAD_TYPE === 'POD');
                const productUploadsExist = (productDataMap.get(r) || []).length > 0;
                
                const transitDate  = fmtDate(order.TRANSIT_DATE);
                const orderDate    = fmtDate(order.ORDER_DATE);
                const deliveryDate = 'N/A'; // No TRACK collection
                
                let podManual = 'N/A'; 
                if (podUpload) podManual = `<a href="${podUpload.FILE_URL}" target="_blank" class="text-blue-600 hover:underline">View POD</a>`; 
                else if (deliveryDate === 'N/A') podManual = 'PENDING';
                
                // *** UPDATED: Calls the globally defined print functions from docgen.js ***
                const rows = [ 
                    { sl: 1, date: transitDate, system: `<a href="#" onclick="printSelectedShipmentReceipt(); return false;" class="text-blue-600 hover:underline">RECIEPT</a>`, manual: receiptUpload ? `<a href="${receiptUpload.FILE_URL}" target="_blank" class="text-blue-600 hover:underline">View Receipt</a>` : 'N/A' }, 
                    { sl: 2, date: orderDate, system: `<a href="#" onclick="printSelectedShipmentLabel(); return false;" class="text-blue-600 hover:underline">LABLE</a>`, manual: 'NA' }, 
                    { sl: 3, date: deliveryDate, system: `<a href="#" onclick="printSelectedShipmentPOD(); return false;" class="text-blue-600 hover:underline">POD</a>`, manual: podManual }, 
                    { sl: 4, date: orderDate, system: `<a href="#" onclick="console.warn('Challan generation logic (buildChallan) exists but needs a print function.'); return false;" class="text-blue-600 hover:underline">CHALLAN</a>`, manual: 'NA', condition: !productUploadsExist }, 
                    { sl: 5, date: orderDate, system: `<a href="#" onclick="printSelectedShipmentOfficeCopy(); return false;" class="text-blue-600 hover:underline">OFFICE COPY</a>`, manual: 'NA' }, 
                ];
                // ***************************************************************
                
                let h = '';
                
                // Mobile List View (like timeline)
                h += `<div class="space-y-3 text-sm sm:hidden">`;
                rows.forEach(row => {
                    if (row.condition === undefined || row.condition === true) {
                        h += `<div class="p-3 bg-gray-50 rounded-md border">
                                <div class="font-semibold text-gray-800">${row.system}</div>
                                <div class="flex justify-between mt-1 pt-1 border-t">
                                    <span class="text-gray-500">Date:</span>
                                    <span class="font-medium text-gray-700">${row.date}</span>
                                V                               </div>
                                <div class="flex justify-between mt-1">
                                    <span class="text-gray-500">Manual:</span>
                                    <span class="font-medium text-gray-700 text-right">${row.manual}</span>
                                </div>
                              </div>`;
                    }
                });
                h += `</div>`;

                // Desktop Table View
                h += `<div class="hidden sm:block overflow-x-auto border rounded-md"><table id="docCenterTable" class="min-w-full text-xs divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">Sl.No</th><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">Date</th><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">System</th><th class="px-2 py-1 text-left font-medium text-gray-500 uppercase">Manual</th></tr></thead><tbody class="bg-white divide-y divide-gray-200">`;
                rows.forEach(row => { 
                    if (row.condition === undefined || row.condition === true) 
                        // *** FIX: Corrected class_A typo ***
                        h += `<tr><td class="px-2 py-1">${row.sl}</td><td class="px-2 py-1">${row.date}</td><td class="px-2 py-1">${row.system}</td><td class="px-2 py-1">${row.manual}</td></tr>`; 
                });
                h += `</tbody></table></div>`;
                
                // *** MODIFICATION START: Added layout selector ***
                h += `<div class="flex justify-end items-center gap-2 pt-3">
                        <label for="label-print-layout" class="text-xs text-gray-600">Label Layout:</label>
                        <select id="label-print-layout" class="form-input text-xs" style="width: auto; padding: 2px 6px;">
                            <option value="2up-landscape">2-up Landscape (1x2)</option>
                            <option value="4up-portrait">4-up Portrait (2x2)</option>
                        </select>
                      </div>`;
                // *** MODIFICATION END ***

                ui.documentCenterContainer.innerHTML = `<div class="detail-card-header flex justify-between items-center">
                                                            <h3 class="font-semibold text-gray-700">Document Center</h3>
                                                            <button class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200">UPLOAD</button>
                                                        </div><div class="detail-card-body">${h}</div>`;
             }

        });
    </script>
</body>
