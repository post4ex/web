<script src="core/search-modal.js"></script>
<!-- Header -->
<header class="w-full bg-white text-blue-900 shadow-md py-2 px-6 sticky top-0 z-30">
    <div class="container-fluid mx-auto flex items-center justify-between relative">
        
        <!-- Left Section: Logo & Navigation -->
        <div class="flex items-center space-x-8">
            <!-- Logo & Sidebar Toggle -->
            <div class="flex items-center space-x-4 flex-shrink-0">
                <div id="sidebar-toggle-container" class="hidden">
                <button id="sidebar-toggle" class="p-2 rounded-lg focus:outline-none" style="color: #9C2007;" onmouseover="this.style.color='#8C1C06'" onmouseout="this.style.color='#9C2007'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
                <a href="main.html" id="logoLink" class="flex items-center space-x-2">
                    <img src="assets/images/post4ex-logo.svg" alt="Post4Ex" class="h-10 w-auto">
                </a>
            </div>

            <!-- Desktop Navigation (Generated via Script) -->
            <nav class="hidden xl:flex items-center space-x-2 text-sm font-semibold">
                <div id="container-desktop-public" class="flex items-center space-x-2"></div>
                <div id="container-desktop-private" class="hidden items-center space-x-2"></div>
            </nav>
        </div>

        <!-- Right Section: Auth Controls & Tools -->
        <div class="flex items-center space-x-2">
            
            <!-- Eruda DevTools Button removed -->
                <button id="nav-search-private" title="Track Shipment" class="p-2 rounded-full bg-red-100 transition-colors hidden" style="color: #9C2007;" onmouseover="this.style.backgroundColor='#FEF2F2'" onmouseout="this.style.backgroundColor='#FEF2F2'" onclick="typeof openSearchModal === 'function' && openSearchModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                </button>

                <!-- Global Notification Bell (Visible on ALL devices) -->
                <div class="relative hidden" id="notification-container-global">
                <button id="notification-button-global" class="p-2 rounded-full bg-red-100 transition-colors relative focus:outline-none" title="Notifications" style="color: #9C2007;" onmouseover="this.style.backgroundColor='#FEF2F2'" onmouseout="this.style.backgroundColor='#FEF2F2'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <!-- Badge -->
                    <span id="notification-badge-global" class="absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-red-100 transform translate-x-1/4 -translate-y-1/4 bg-red-600 rounded-full hidden">0</span>
                </button>
                
                <!-- Dropdown (Positioned to not overflow on mobile) -->
                <div id="notification-dropdown" class="absolute right-0 mt-3 w-72 sm:w-80 bg-white rounded-lg shadow-xl z-50 hidden border border-gray-100 overflow-hidden">
                    <div class="p-3 border-b bg-gray-50 flex justify-between items-center gap-2">
                        <h3 class="font-semibold text-gray-700 text-sm">Notifications</h3>
                        <div class="flex items-center gap-2">
                            <button id="notif-mark-all-read" class="text-xs text-blue-600 hover:underline" title="Mark all read">✓ All read</button>
                            <button id="notif-clear-all" class="text-xs text-red-500 hover:underline" title="Clear all">🗑 Clear all</button>
                        </div>
                    </div>
                    <div id="notification-list-global" class="max-h-64 overflow-y-auto p-2 space-y-2">
                        <p class="text-sm text-gray-500 text-center py-4">No new notifications</p>
                    </div>
                </div>
            </div>

            <!-- Auth Controls & Tools -->
            <div class="flex items-center space-x-4">
                <button id="desktop-logout-button" title="Logout" class="p-2 rounded-full bg-red-100 transition-colors hidden" style="color: #9C2007;" onmouseover="this.style.backgroundColor='#FEF2F2'" onmouseout="this.style.backgroundColor='#FEF2F2'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>

                <a id="login-button" href="login.html" class="btn">Login</a>
            </div>

        </div>
    </div>
</header>

<!-- Sidebar (Content Generated via Script) -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-48 bg-white/10 backdrop-blur-sm text-white transform -translate-x-full transition-transform duration-300 ease-in-out z-50 overflow-y-auto flex flex-col">
    <div class="p-4 flex flex-col flex-1">
        <a href="dashboard.html" class="btn w-full mb-4">Dashboard</a>
        <nav id="container-sidebar-nav" class="space-y-2 flex-1"></nav>
        <!-- Profile -->
        <div class="mt-2">
            <button onclick="toggleSubmenu('profile-details-submenu')" class="btn w-full mb-1 justify-between">
                <span>Profile</span>
                <svg class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div id="profile-details-submenu" class="hidden pl-2 mb-1">
                <div id="profile-details-container" class="space-y-1 tray p-2"></div>
            </div>
        </div>
        <!-- Logout -->
        <button id="profile-logout-button" class="btn w-full mt-1">Logout</button>
    </div>
</aside>

<div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"></div>

<!-- NAVIGATION CONFIGURATION & RENDERING -->
<script>
    // ============================================================================
    // 1. ROLE HIERARCHY — use global ROLE_LEVELS from app-config.js
    // ============================================================================

    function getUserLevel() {
        try {
            const d = JSON.parse(localStorage.getItem('loginData') || '{}');
            const role = (d.userData || {}).ROLE || 'GUEST';
            return (window.ROLE_LEVELS || {})[role] || 0;
        } catch { return 0; }
    }

    // ============================================================================
    // 2. MENU CONFIGURATION
    // ============================================================================
    const NAV_CONFIG = {
        public: [
            { label: 'Home', link: 'main.html', id: 'home' },
            { label: 'Pincode', link: 'Pincode.html', id: 'pincode' },
            { label: 'Complaint', link: 'complaint.html', id: 'complaint' }
        ],
        private: [
            { label: 'Book Order', link: 'BookOrder.html', id: 'bookorder', reqRole: 'CLIENT' },
            { label: 'Estimate', link: 'calc.html', id: 'calculator', reqRole: 'CLIENT' },
            { label: 'Ticket', link: 'ticket.html', id: 'ticket', reqRole: 'CLIENT' },
            { label: 'Task', link: 'task.html', id: 'task', reqRole: 'CLIENT' },
        ],
        sidebar: [
            { label: 'Book Order', link: 'BookOrder.html', reqRole: 'CLIENT' },
            { label: 'Shipments', link: 'Shipments.html', reqRole: 'CLIENT' },
            { label: 'Task', link: 'task.html', reqRole: 'CLIENT' },
            { 
                label: 'Scans', 
                id: 'scans', 
                reqRole: 'CLIENT', 
                submenu: [
                    { label: 'Pickup Request', link: 'PickupRequest.html', reqRole: 'CLIENT' },
                    { label: 'OutMenifest', link: 'OutMenifest.html', reqRole: 'CLIENT' },
                    { label: 'InMenifest', link: 'InMenifest.html', reqRole: 'CLIENT' },
                    { label: 'RunSheet', link: 'RunSheet.html', reqRole: 'CLIENT' },
                    { label: 'Update', link: 'Update.html', reqRole: 'CLIENT' },
                    { label: 'POD', link: 'POD.html', reqRole: 'CLIENT' }
                ] 
            },
            { label: 'Uploader', link: 'uploader.html', reqRole: 'CLIENT' },
            { label: 'CRM', link: 'CRM.html', reqRole: 'CLIENT' },
            { 
                label: 'Report', 
                id: 'report', 
                reqRole: 'CLIENT',
                submenu: [
                    { label: 'Booking', link: 'ReportBooking.html', reqRole: 'CLIENT' },
                    { label: 'Menifest', link: 'ReportMenifest.html', reqRole: 'CLIENT' },
                    { label: 'Update', link: 'ReportUpdate.html', reqRole: 'CLIENT' },
                    { label: 'Runsheet', link: 'ReportRunsheet.html', reqRole: 'CLIENT' },
                    { label: 'CRM', link: 'ReportCRM.html', reqRole: 'CLIENT' }
                ] 
            },
            { label: 'The Vault', link: 'vault.html', reqRole: 'CLIENT' },
            { label: 'Masters', link: 'admin.html', reqRole: 'CLIENT' }
        ]
    };

    // ============================================================================
    // 3. RENDERING FUNCTIONS
    // ============================================================================
    function hasPermission(itemRole) {
        if (!itemRole) return true;
        const userLevel = getUserLevel();
        const reqLevel = (window.ROLE_LEVELS || {})[itemRole] || 0;
        return userLevel >= reqLevel;
    }

    function renderNavItems(items, type) { 
        const desktopContainer = document.getElementById(`container-desktop-${type}`);
        if (!desktopContainer) return;

        let desktopHTML = '';
        items.forEach(item => {
            if (!hasPermission(item.reqRole)) return; 
            desktopHTML += `<a id="nav-${item.id}-${type}" href="${item.link}" class="btn">${item.label}</a>`;
        });
        desktopContainer.innerHTML = desktopHTML;
    }

    function renderSidebar() {
        const container = document.getElementById('container-sidebar-nav');
        if (!container) return;

        let html = '';
        NAV_CONFIG.sidebar.forEach(item => {
            if (!hasPermission(item.reqRole)) return; 

            if (item.submenu) {
                const visibleSubItems = item.submenu.filter(sub => hasPermission(sub.reqRole));
                if (visibleSubItems.length > 0) {
                    const submenuId = `${item.id}-submenu`;
                    html += `
                        <div>
                            <button onclick="toggleSubmenu('${submenuId}')" class="btn w-full mb-1 justify-between">
                                <span>${item.label}</span>
                                <svg class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                            </button>
                            <div id="${submenuId}" class="hidden pl-4 mt-1 space-y-1">
                                ${visibleSubItems.map(sub => `<a href="${sub.link}" class="btn w-full mb-1">${sub.label}</a>`).join('')}
                            </div>
                        </div>`;
                }
            } else {
                html += `<a href="${item.link}" class="btn w-full mb-1">${item.label}</a>`;
            }
        });

        container.innerHTML = html;
    }

    function toggleSubmenu(submenuId) {
        const submenu = document.getElementById(submenuId);
        if (submenu) {
            submenu.classList.toggle('hidden');
            const arrow = submenu.previousElementSibling.querySelector('svg');
            if (arrow) {
                arrow.classList.toggle('rotate-180');
            }
        }
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    window.addEventListener('footerLoaded', () => {
        renderNavItems(NAV_CONFIG.public, 'public');
        renderNavItems(NAV_CONFIG.private, 'private');
        renderSidebar();

        // 2. Setup Notification Dropdown Toggle (GLOBAL)
        const notifBtn = document.getElementById('notification-container-global');
        const notifDrop = document.getElementById('notification-dropdown');
        if (notifBtn && notifDrop) {
            notifBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                notifDrop.classList.toggle('hidden');
            });
            document.addEventListener('click', (e) => {
                if (!notifDrop.contains(e.target) && !notifBtn.contains(e.target)) {
                    notifDrop.classList.add('hidden');
                }
            });
        }
        
        // 3. Setup Mobile Refresh removed — SSE handles live updates
        
        const checkMobileTools = () => {
            if (localStorage.getItem('loginData')) {
                const globalNotif = document.getElementById('notification-container-global');
                if (globalNotif) globalNotif.classList.remove('hidden');

                const searchBtn = document.getElementById('nav-search-private');
                if (searchBtn) searchBtn.classList.remove('hidden');

                document.getElementById('container-desktop-private')?.classList.remove('hidden');
                document.getElementById('container-desktop-private')?.classList.add('flex');
                document.getElementById('container-desktop-public')?.classList.add('hidden');

                const desktopLogout = document.getElementById('desktop-logout-button');
                if (desktopLogout) {
                    desktopLogout.style.display = window.innerWidth >= 1280 ? 'flex' : 'none';
                    window.addEventListener('resize', () => {
                        desktopLogout.style.display = window.innerWidth >= 1280 ? 'flex' : 'none';
                    });
                    desktopLogout.addEventListener('click', () => typeof handleLogout === 'function' && handleLogout());
                }
            }
        };
        checkMobileTools();
    });
</script>
