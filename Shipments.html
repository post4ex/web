<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipments</title>
    <link href="style.css" rel="stylesheet">
    <link href="assets/css/inter-font.css" rel="stylesheet">

    <style>
        /* Right Pane Details */
        .detail-card {
            background-color: #ffffff;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .detail-card-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            background-color: #f9fafb;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }
        .detail-card-body { padding: 1rem; }

        /* Tracking timeline */
        .timeline { position: relative; padding-left: 1.5rem; border-left: 2px solid #e5e7eb; }
        .timeline-item { margin-bottom: 1rem; }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-dot {
            position: absolute; left: -0.5rem; top: 0.25rem;
            width: 0.875rem; height: 0.875rem;
            background-color: #3b82f6; border-radius: 50%; border: 2px solid #fff;
        }

        /* Tables */
        #uploadsTable th, #uploadsTable td,
        #trackingHistoryTable th, #trackingHistoryTable td { padding: 0.5rem; font-size: 0.8rem; }

        /* Tiles view */
        #tilesView { display:flex;flex-direction:column;align-items:center;width:100%;flex:1;padding:2rem 1rem;overflow-y:auto; }
        .tile-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1rem;width:100%;max-width:900px; }
        .tile { background:#fff;border-radius:.75rem;padding:1.5rem 1rem;text-align:center;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .15s; }
        .tile:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12); }
        .tile-icon { font-size:2rem;margin-bottom:.5rem; }
        .tile-count { font-size:1.75rem;font-weight:700;line-height:1; }
        .tile-label { font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem;color:#6b7280; }

        /* Document Center action buttons */
        .doc-action-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 6px; border-radius: 4px; border: none; cursor: pointer;
            background: transparent; color: #6b7280; flex: 1;
        }
        .doc-action-btn:hover { background: #f3f4f6; color: #111827; }
        .doc-action-btn--wa { color: #16a34a; }
        .doc-action-btn--wa:hover { background: #f0fdf4; }
        .doc-action-btn--tg { color: #2563eb; }
        .doc-action-btn--tg:hover { background: #eff6ff; }
        .doc-action-btn--disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col">
    <!-- Header placeholder -->
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <!-- Tiles View -->
    <div id="tilesView" style="display:none;">
        <div class="w-full mb-4 flex items-center gap-3" style="max-width:900px;">
            <h1 class="text-2xl font-bold text-gray-800 flex-1">Shipments</h1>
        </div>
        <div class="tile-grid">
            <div class="tile" data-tile="all" style="border-color:#e5e7eb;">
                <div class="tile-icon">📦</div>
                <div class="tile-count text-gray-700" id="cnt-all">…</div>
                <div class="tile-label">Total</div>
            </div>
            <div class="tile" data-tile="topay" style="border-color:#fef3c7;">
                <div class="tile-icon">💰</div>
                <div class="tile-count text-amber-600" id="cnt-topay">…</div>
                <div class="tile-label">To Pay</div>
            </div>
            <div class="tile" data-tile="cod" style="border-color:#ede9fe;">
                <div class="tile-icon">💵</div>
                <div class="tile-count text-purple-700" id="cnt-cod">…</div>
                <div class="tile-label">COD</div>
            </div>
            <div class="tile" data-tile="track" style="border-color:#d1fae5;">
                <div class="tile-icon">📡</div>
                <div class="tile-count text-green-700" id="cnt-track">—</div>
                <div class="tile-label">Track</div>
            </div>
        </div>
    </div>

    <!-- Split View -->
    <div id="splitViewWrapper" class="split-view" style="display:none;">

        <!-- Left Pane: Shipment List -->
        <aside id="shipmentListPane">
            <div class="sv-pane-header">
                <div class="flex items-center gap-2 mb-3">
                    <button id="backToTilesBtn" class="text-gray-400 hover:text-gray-700 p-1 rounded" title="Back to tiles">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    </button>
                    <h2 id="splitTitle" class="text-xl font-bold text-gray-800 flex-1">Shipments</h2>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="searchShipments" placeholder="Search AWB, Ref, Client..." class="form-input w-full text-sm">
                    <button id="filterToggleBtn" class="p-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                    </button>
                </div>
            </div>
            <div id="shipmentListContainer" class="sv-pane-body">
                <p id="status-message" class="text-gray-600 p-4 text-center">Loading shipment data...</p>
                <ul id="shipmentList">
                    <!-- Rendered by JS -->
                </ul>
            </div>
        </aside>

        <!-- Right Pane: Shipment Details -->
        <main id="shipmentDetailPane" class="p-6 md:p-8 hidden md:block">
            <!-- Back button (mobile only) -->
            <div class="p-4 border-b md:hidden bg-white -mt-6 -mx-6 mb-6 shadow-sm">
                <button type="button" id="backToListBtn" class="btn-ghost btn-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to List
                </button>
            </div>

            <div id="detailView" class="hidden space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div id="documentCenterContainer" class="detail-card"></div>
                    <div id="shipmentDetailsContainer" class="detail-card"></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div id="consignorDetailsContainer" class="detail-card"></div>
                    <div id="consigneeDetailsContainer" class="detail-card"></div>
                </div>
                <div id="productBoxDetailsContainer" class="detail-card"></div>
                <div id="trackingStatusContainer" class="detail-card"></div>
                <div id="trackingHistoryContainer" class="detail-card"></div>
            </div>

            <!-- Track tile detail view -->
            <div id="trackDetailView" class="hidden space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div id="t-shipmentDetailsContainer" class="detail-card"></div>
                    <div id="t-consignorDetailsContainer" class="detail-card"></div>
                </div>
                <div id="t-consigneeDetailsContainer" class="detail-card"></div>
                <div id="t-trackingStatusContainer" class="detail-card"></div>
                <div id="t-trackingHistoryContainer" class="detail-card"></div>
            </div>

            <div id="emptyView" class="h-full flex items-center justify-center">
                <p class="text-gray-500 text-lg">Select a shipment from the list to view details.</p>
            </div>
        </main>
    </div><!-- /splitViewWrapper -->

    <!-- POD Image Popup -->
    <div id="podImagePopup" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70" onclick="document.getElementById('podImagePopup').classList.add('hidden')">
        <div class="relative max-w-3xl w-full mx-4" onclick="event.stopPropagation()">
            <button onclick="document.getElementById('podImagePopup').classList.add('hidden')" class="absolute -top-8 right-0 text-white text-sm hover:text-gray-300">&#x2715; Close</button>
            <img id="podImageEl" src="" class="w-full rounded shadow-lg" alt="POD">
        </div>
    </div>

    <!-- Filter Modal -->
    <div id="filterModal" class="modal-overlay hidden">
        <div class="modal-content space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Filter Shipments</h2>
                <button id="close-filter-modal" class="p-1.5 text-gray-500 rounded hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="filter-start-date" class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" id="filter-start-date" class="form-input mt-1 block w-full text-sm">
                </div>
                <div>
                    <label for="filter-end-date" class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" id="filter-end-date" class="form-input mt-1 block w-full text-sm">
                </div>
                <div>
                    <label for="filter-branch" class="block text-sm font-medium text-gray-700">Branch</label>
                    <select id="filter-branch" class="form-input mt-1 block w-full text-sm"><option value="">All</option></select>
                </div>
                <div>
                    <label for="filter-code" class="block text-sm font-medium text-gray-700">Code</label>
                    <select id="filter-code" class="form-input mt-1 block w-full text-sm"><option value="">All</option></select>
                </div>
                <div class="sm:col-span-2">
                    <label for="filter-carrier" class="block text-sm font-medium text-gray-700">Carrier</label>
                    <select id="filter-carrier" class="form-input mt-1 block w-full text-sm"><option value="">All</option></select>
                </div>
            </div>
            <div class="flex justify-end gap-4 pt-4 border-t">
                <button id="reset-filters" class="btn-ghost">Reset</button>
                <button id="apply-filters" class="btn">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- Footer placeholder -->
    <div id="footer-placeholder" class="mt-auto" style="min-height:26px"><div class="animate-pulse bg-gray-200 h-7 w-full"></div></div>

    <script src="core/book-order.js"></script>
    <script src="indexeddb.js"></script>
    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    <script src="jawaS/shipments.js"></script>
    <script src="utils/docgen.js"></script>
    <script src="jawaS/track-tile.js"></script>
</body>
</html>
