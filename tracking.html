<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Shipment</title>
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <main class="w-full flex-grow p-4 sm:p-8">
        <div class="container">
            <div class="card">

                <!-- SEARCH ROW -->
                <div class="flex flex-col sm:flex-row items-center gap-3 mb-4">
                    <input type="text" id="searchInput" placeholder="Enter AWB or Reference Number"
                        class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-700 w-full text-sm font-semibold">
                    <button id="searchButton"
                        class="px-6 py-3 bg-blue-800 text-white font-bold rounded-lg hover:bg-blue-900 transition-colors w-full sm:w-auto text-sm">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i> Track
                    </button>
                </div>

                <!-- LOADING -->
                <div id="loadingIndicator" class="hidden text-center text-gray-500 py-4">
                    <i class="fa-solid fa-circle-notch fa-spin text-blue-800 text-xl"></i>
                    <p class="text-xs mt-1">Fetching tracking data...</p>
                </div>

                <!-- RESULTS -->
                <div id="resultsContainer" class="hidden space-y-4"></div>

                <!-- MESSAGE -->
                <div id="messageBox" class="hidden p-3 rounded-lg text-sm font-semibold text-center"></div>

            </div>
        </div>
    </main>

    <div id="footer-placeholder" class="mt-auto" style="min-height:36px"><div class="animate-pulse bg-gray-200 h-10 w-full"></div></div>

    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="indexeddb.js"></script>
    <script src="core/layout.js"></script>
    <script>
    (function () {
        const API = () => CONSTANTS.OPERATIONS_URL;

        function showMsg(text, type) {
            const el = document.getElementById('messageBox');
            el.textContent = text;
            el.className = 'p-3 rounded-lg text-sm font-semibold text-center';
            if (type === 'error')        el.classList.add('bg-red-100',   'text-red-700');
            else if (type === 'success') el.classList.add('bg-green-100', 'text-green-700');
            else                         el.classList.add('bg-blue-50',   'text-blue-700');
            el.classList.remove('hidden');
        }

        function hideMsg()      { document.getElementById('messageBox').classList.add('hidden'); }
        function showLoading(v) { document.getElementById('loadingIndicator').classList.toggle('hidden', !v); }

        const STATE_BADGE = {
            delivered:      { bg: 'bg-green-100',  text: 'text-green-700',  icon: 'fa-circle-check',         label: 'Delivered'        },
            outfordelivery: { bg: 'bg-blue-100',   text: 'text-blue-700',   icon: 'fa-truck',                label: 'Out for Delivery' },
            intransit:      { bg: 'bg-yellow-100', text: 'text-yellow-700', icon: 'fa-route',                label: 'In Transit'       },
            exception:      { bg: 'bg-red-100',    text: 'text-red-700',    icon: 'fa-triangle-exclamation', label: 'Exception'        },
            pending:        { bg: 'bg-gray-100',   text: 'text-gray-600',   icon: 'fa-clock',                label: 'Pending'          },
        };

        function renderResult(data) {
            const s   = data.shipment || {};
            const mvs = data.movements || [];
            const st  = STATE_BADGE[s.state] || STATE_BADGE.pending;

            const movHtml = mvs.length ? mvs.map(m => `
                <div class="flex gap-3 text-xs">
                    <div class="flex flex-col items-center">
                        <div class="w-2 h-2 rounded-full bg-blue-400 mt-1 shrink-0"></div>
                        <div class="w-px flex-1 bg-gray-200"></div>
                    </div>
                    <div class="pb-3">
                        <p class="font-semibold text-gray-700">${m.activity || ''}</p>
                        <p class="text-gray-400">${m.location || ''} &nbsp;·&nbsp; ${m.date || ''} ${m.time || ''}</p>
                    </div>
                </div>`).join('') : '<p class="text-xs text-gray-400">No movements yet.</p>';

            const html = `
                <div class="space-y-4">
                    <div class="flex items-center gap-2">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${st.bg} ${st.text}">
                            <i class="fa-solid ${st.icon}"></i> ${st.label}
                        </span>
                    </div>
                    <div class="text-xs text-gray-500 space-y-1">
                        ${s.carrier_name ? `<p><span class="font-semibold text-gray-700">Carrier:</span> ${s.carrier_name}</p>` : ''}
                        ${s.carrier      ? `<p><span class="font-semibold text-gray-700">Service:</span> ${s.carrier}</p>` : ''}
                        ${s.status_raw   ? `<p><span class="font-semibold text-gray-700">Status:</span> ${s.status_raw}</p>` : ''}
                        ${s.origin       ? `<p><span class="font-semibold text-gray-700">Origin:</span> ${s.origin}</p>` : ''}
                        ${s.destination  ? `<p><span class="font-semibold text-gray-700">Destination:</span> ${s.destination}</p>` : ''}
                        ${s.booked_date  ? `<p><span class="font-semibold text-gray-700">Booked:</span> ${s.booked_date}</p>` : ''}
                        ${s.weight       ? `<p><span class="font-semibold text-gray-700">Weight:</span> ${s.weight} kg</p>` : ''}
                    </div>
                    <div>
                        <p class="text-xs font-bold text-gray-500 uppercase mb-2">Movement History</p>
                        <div class="max-h-96 overflow-y-auto pr-1">${movHtml}</div>
                    </div>
                </div>`;

            const rc = document.getElementById('resultsContainer');
            rc.innerHTML = html;
            rc.classList.remove('hidden');
        }

        async function doTrack() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { showMsg('Please enter an AWB or Reference number.', 'error'); return; }

            document.getElementById('resultsContainer').classList.add('hidden');
            document.getElementById('resultsContainer').innerHTML = '';
            hideMsg();
            showLoading(true);

            try {
                const token = getSessionId();
                // detect ref (14 digits) or awb
                const param = (query.match(/^\d{14}$/) ? 'ref' : 'awb') ;
                const res   = await fetch(`${API()}/api/track?${param}=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                showLoading(false);

                if (res.status === 401) { handleLogout(); return; }
                if (res.status === 404) { showMsg('Shipment not found.', 'error'); return; }
                if (!res.ok)            { showMsg('Something went wrong. Please try again.', 'error'); return; }

                const data = await res.json();
                renderResult(data);
            } catch (e) {
                showLoading(false);
                showMsg('Network error. Please try again.', 'error');
            }
        }

        function init() {
            document.getElementById('searchButton').addEventListener('click', doTrack);
            document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') doTrack(); });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
