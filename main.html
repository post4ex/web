<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    
    <!-- Preload critical components -->
    <link rel="preload" href="layout.js" as="script">

    <link href="assets/css/inter-font.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* --- MODAL STYLES --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-overlay.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- TRACKING WIDGET OVERRIDES --- */
        #tracking-content-area .sm\:flex-row {
            flex-direction: column !important;
            align-items: stretch !important;
        }
        #tracking-content-area .sm\:w-1\/4 {
            width: 100% !important;
        }
        #tracking-content-area .sm\:w-auto {
            width: 100% !important;
        }

        /* --- SERVICES SLIDESHOW --- */
        #svc-viewport { overflow: hidden; }
        #svc-track { display: flex; transition: transform 0.4s ease; will-change: transform; }
        #svc-track > div { flex: 0 0 100%; }

        /* --- DYNAMIC LAYOUT EXPANSION (CSS :has TRICK) --- */
        @media (min-width: 1024px) {
            #main-split-layout:has(#resultsContainer:not(.hidden)),
            #main-split-layout:has(#results-container:not(.hidden)) {
                flex-wrap: wrap; 
            }
            #main-split-layout:has(#resultsContainer:not(.hidden)) > div:first-child,
            #main-split-layout:has(#results-container:not(.hidden)) > div:first-child {
                width: 100%;
            }
            #main-split-layout:has(#resultsContainer:not(.hidden)) > #tracking-content-area,
            #main-split-layout:has(#results-container:not(.hidden)) > #tracking-content-area {
                width: 100%;
            }
        }
    </style>
</head>

    <!-- COMPLAINT POPUP MODAL -->

    <div id="footer-placeholder" class="mt-auto" style="min-height:36px"><div class="animate-pulse bg-gray-200 h-10 w-full"></div></div>

    <script src="indexeddb.js"></script>
    <script src="layout.js"></script>
    <script>
        // ============================================================================
        // 1. INJECTION LOGIC (Replacer)
        // ============================================================================
        window.loadMobileServicesSlideshow = function() {
            const area = document.getElementById('services-content-area');
            if (!area) return;
            const services = [
                {
                    icon: 'fa-plane-departure', iconBg: 'bg-blue-100', iconColor: 'text-blue-700',
                    name: 'AirLine Services', desc: 'Our AirLine Services offer the fastest way to get your consignments to their destination, ensuring timely and secure delivery across the globe.',
                    features: ['24-48 Hour Global Delivery', 'Door-to-Airport & Door-to-Door', 'Real-time GPS Flight Tracking', 'Customs Clearance Support'],
                    idealColor: 'text-blue-800 bg-blue-50', ideal: 'High-value electronics, medical supplies, legal documents.',
                    ctaBg: 'bg-blue-600 hover:bg-blue-700', cta: 'Book Now'
                },
                {
                    icon: 'fa-truck-fast', iconBg: 'bg-emerald-100', iconColor: 'text-emerald-700',
                    name: 'Surface Services', desc: 'For cost-effective and reliable transportation, our Surface Services are the ideal choice. We handle large and heavy shipments with care.',
                    features: ['Pan-India Coverage (19,000+ Pincodes)', 'FTL & PTL Options', 'GPS-Enabled Fleet', 'Cost-Effective Pricing Models'],
                    idealColor: 'text-emerald-800 bg-emerald-50', ideal: 'Bulk raw materials, furniture, machinery, textiles.',
                    ctaBg: 'bg-emerald-600 hover:bg-emerald-700', cta: 'Check Rates'
                },
                {
                    icon: 'fa-crown', iconBg: 'bg-purple-100', iconColor: 'text-purple-700',
                    name: 'Premium Services', desc: 'Experience the highest standard of service. Enjoy priority handling, real-time tracking, and dedicated support for your most valuable shipments.',
                    features: ['Dedicated Account Manager', 'Money-Back Guarantee on Timing', 'Enhanced Insurance Coverage', '24/7 Priority Support Line'],
                    idealColor: 'text-purple-800 bg-purple-50', ideal: 'Artworks, jewelry, sensitive prototypes, critical spare parts.',
                    ctaBg: 'bg-purple-600 hover:bg-purple-700', cta: 'Get Premium'
                },
                {
                    icon: 'fa-shop', iconBg: 'bg-orange-100', iconColor: 'text-orange-700',
                    name: 'E-Commerce Services', desc: 'Tailored solutions for your online business. We handle everything from last-mile delivery to cash-on-delivery and returns.',
                    features: ['API Integration & Webhooks', 'Cash on Delivery (COD) Management', 'Automated Return (RTO) Handling', 'Branded Tracking Pages'],
                    idealColor: 'text-orange-800 bg-orange-50', ideal: 'D2C brands, online marketplaces, subscription box services.',
                    ctaBg: 'bg-orange-600 hover:bg-orange-700', cta: 'Integrate Now'
                },
                {
                    icon: 'fa-boxes-stacked', iconBg: 'bg-cyan-100', iconColor: 'text-cyan-700',
                    name: 'LTL Services', desc: "Our Less-than-Truckload (LTL) Services are perfect for shipments that don't require a full truck. Flexible and economical.",
                    features: ['Pay only for space occupied', 'Palletized Handling', 'Hub-and-Spoke Distribution', 'Barcode Tracking per Pallet'],
                    idealColor: 'text-cyan-800 bg-cyan-50', ideal: 'Small manufacturers, distributors, businesses with fluctuating loads.',
                    ctaBg: 'bg-cyan-600 hover:bg-cyan-700', cta: 'Request LTL'
                },
                {
                    icon: 'fa-hand-holding-dollar', iconBg: 'bg-slate-200', iconColor: 'text-slate-700',
                    name: 'VAS Services', desc: 'Enhance your logistics with our Value-Added Services (VAS), including special handling, packaging, and customizable solutions.',
                    features: ['Professional Packaging & Crating', 'Warehousing & Storage', 'Labeling & Kitting', 'Document Collection on Delivery'],
                    idealColor: 'text-slate-800 bg-slate-200', ideal: 'Fragile items, promotional kits, regulated chemical shipments.',
                    ctaBg: 'bg-slate-700 hover:bg-slate-800', cta: 'Explore VAS'
                }
            ];
            const slides = services.map(s => `
                <div>
                    <div class="service-card bg-gray-50 p-6 rounded-lg border border-gray-200 flex flex-col items-center text-center hover:shadow-lg transition-all duration-300">
                        <div class="w-16 h-16 mb-4 ${s.iconBg} ${s.iconColor} rounded-full flex items-center justify-center">
                            <i class="fa-solid ${s.icon} text-3xl"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">${s.name}</h3>
                        <p class="text-gray-600 mb-4 text-sm">${s.desc}</p>
                        <div class="text-left w-full border-t border-gray-200 pt-4">
                            <div class="space-y-3 text-sm text-gray-600">
                                <div>
                                    <h4 class="font-bold text-gray-800 mb-1">Key Features:</h4>
                                    <ul class="list-disc list-inside space-y-0.5">${s.features.map(f => `<li>${f}</li>`).join('')}</ul>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800 mb-1">Ideal For:</h4>
                                    <p class="${s.idealColor} p-2 rounded text-xs">${s.ideal}</p>
                                </div>
                                <div class="pt-1">
                                    <a href="login.html" class="inline-block w-full px-4 py-2 ${s.ctaBg} text-white rounded transition-colors text-sm font-bold uppercase tracking-wider">${s.cta}</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
            area.innerHTML = `
                <div id="svc-viewport"><div id="svc-track">${slides}</div></div>
                <div class="flex justify-center gap-1.5 mt-3">
                    ${services.map((_, i) => `<button data-i="${i}" class="svc-dot h-1.5 rounded-full transition-all" style="width:${i===0?'20px':'8px'};background:${i===0?'#9C2007':'#D1D5DB'}"></button>`).join('')}
                </div>`;
            let cur = 0, timer;
            const track = document.getElementById('svc-track');
            const dots = document.querySelectorAll('.svc-dot');
            const go = (n) => {
                cur = (n + services.length) % services.length;
                track.style.transform = `translateX(-${cur * 100}%)`;
                dots.forEach((d, i) => { d.style.width = i === cur ? '20px' : '8px'; d.style.background = i === cur ? '#9C2007' : '#D1D5DB'; });
            };
            const start = () => { timer = setInterval(() => go(cur + 1), 4000); };
            const stop = () => clearInterval(timer);
            dots.forEach(d => d.addEventListener('click', () => { stop(); go(+d.dataset.i); start(); }));
            let tx = 0;
            track.addEventListener('touchstart', e => { tx = e.touches[0].clientX; stop(); }, { passive: true });
            track.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - tx; if (Math.abs(dx) > 40) go(cur + (dx < 0 ? 1 : -1)); start(); }, { passive: true });
            start();
        };

        window.loadService = function(url) {
            const servicesArea = document.getElementById('services-content-area');
            const trackingArea = document.getElementById('tracking-content-area');

            // Scenario 2: If a button is clicked, hide current tracking results
            if (trackingArea) {
                // Targeting both common ID conventions found in the project
                const results = trackingArea.querySelector('#resultsContainer') || trackingArea.querySelector('#results-container');
                if (results) results.classList.add('hidden');
            }

            if(servicesArea) {
                servicesArea.classList.remove('hidden');
                if (typeof window.loadDynamicContent === 'function') {
                    loadDynamicContent(url, 'services-content-area');
                }
                servicesArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ============================================================================
        // 2. MODAL LOGIC (Global Scope)
        // ============================================================================

        window.openContactModal = function() {
            const modal = document.getElementById('contactModal');
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                console.warn("Contact Modal not found. It might still be loading from the footer.");
                showNotification("Contact details are loading...", "info");
            }
        }

        window.closeContactModal = function() {
            const modal = document.getElementById('contactModal');
            if(modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        window.openComplaintModal = function() {
            const modal = document.getElementById('complaintModal');
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
                document.getElementById('complaintSearchInput').value = '';
                document.getElementById('complaintMessageContainer').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('complaintResultsContainer').classList.add('hidden');
                document.getElementById('complaintMessageBox').classList.add('hidden');
            }
        }

        window.closeComplaintModal = function() {
            const modal = document.getElementById('complaintModal');
            if(modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        window.openFaqModal = function() {
            const modal = document.getElementById('faqModal');
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
                const contentArea = document.getElementById('faqContentArea');
                if (contentArea && contentArea.innerText.includes('Loading')) {
                    if (typeof window.loadDynamicContent === 'function') {
                        loadDynamicContent('faqs.html', 'faqContentArea');
                    }
                }
            }
        }

        window.closeFaqModal = function() {
            const modal = document.getElementById('faqModal');
            if(modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        // ============================================================================
        // 3. INITIALIZATION
        // ============================================================================
        
        window.addEventListener('footerLoaded', () => {
            const contactClose = document.getElementById('closeContactModalButton');
            const contactModal = document.getElementById('contactModal');
            if(contactClose) contactClose.addEventListener('click', window.closeContactModal);
            if(contactModal) {
                contactModal.addEventListener('click', (e) => {
                    if (e.target === contactModal) window.closeContactModal();
                });
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const complaintClose = document.getElementById('closeComplaintModalButton');
            const complaintModal = document.getElementById('complaintModal');
            if(complaintClose) complaintClose.addEventListener('click', window.closeComplaintModal);
            if(complaintModal) {
                complaintModal.addEventListener('click', (e) => {
                    if (e.target === complaintModal) window.closeComplaintModal();
                });
            }

            const faqClose = document.getElementById('closeFaqModalButton');
            const faqModal = document.getElementById('faqModal');
            if(faqClose) faqClose.addEventListener('click', window.closeFaqModal);
            if(faqModal) {
                faqModal.addEventListener('click', (e) => {
                    if (e.target === faqModal) window.closeFaqModal();
                });
            }

            const searchBtn = document.getElementById('complaintSearchButton');
            const submitBtn = document.getElementById('submitComplaintButton');

            if(searchBtn) {
                searchBtn.addEventListener('click', async () => {
                    const awb = document.getElementById('complaintSearchInput').value.trim();
                    const loader = document.getElementById('complaintLoadingIndicator');
                    const results = document.getElementById('complaintResultsContainer');
                    if(!awb) return alert("Please enter an AWB number.");
                    loader.classList.remove('hidden');
                    results.classList.add('hidden');
                    
                    try {
                        // Real API call to verify AWB existence
                        const response = await callApi('getData', { collection: 'SHIPMENTS/ORDERS', query: awb, searchType: 'ref' });
                        loader.classList.add('hidden');
                        results.classList.remove('hidden');
                        const order = (response.orders && response.orders.length > 0) ? response.orders[0].order : null;
                        results.innerHTML = order ? `<strong>Found:</strong> Shipment <span>#${awb}</span> <br> <span class="text-xs text-gray-500">Status: ${order.STATUS || 'Active'}</span>` : `<span class="text-red-500">AWB not found.</span>`;
                    } catch (e) { loader.classList.add('hidden'); results.classList.remove('hidden'); results.innerHTML = "Error verifying AWB."; }
                });
            }

            if(submitBtn) {
                submitBtn.addEventListener('click', () => {
                    const cat = document.getElementById('complaintCategory').value;
                    const msg = document.getElementById('complaintMessage').value;
                    const box = document.getElementById('complaintMessageBox');
                    if(!cat || !msg) {
                        box.textContent = "Please fill all required fields.";
                        box.className = "mt-4 p-3 rounded-lg text-sm text-center font-semibold bg-red-100 text-red-700";
                        box.classList.remove('hidden');
                        return;
                    }
                    const status = document.getElementById('emailSendingStatus');
                    status.classList.remove('hidden');
                    submitBtn.disabled = true;
                    submitBtn.classList.add('opacity-50');
                    setTimeout(() => {
                        status.classList.add('hidden');
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('opacity-50');
                        box.textContent = "Complaint Registered Successfully! Ticket #8829 created.";
                        box.className = "mt-4 p-3 rounded-lg text-sm text-center font-semibold bg-green-100 text-green-700";
                        box.classList.remove('hidden');
                        setTimeout(() => window.closeComplaintModal(), 2000);
                    }, 1500);
                });
            }
        });
    </script>
</body>
</html>
