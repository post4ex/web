<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f3f4f6; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1.25rem; }
        .tag { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6b7280; margin-bottom: 0.5rem; font-family: monospace; }
        .sample-heading { font-size: 1.25rem; font-weight: 700; color: #111827; margin-bottom: 0.25rem; }
        .sample-sub    { font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
        .sample-body   { font-size: 0.8rem; font-weight: 400; color: #6b7280; margin-bottom: 0.75rem; line-height: 1.5; }
        .sample-data   { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .badge { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: #eff6ff; color: #1d4ed8; }
        .badge.green { background: #f0fdf4; color: #15803d; }
        .badge.gray  { background: #f9fafb; color: #374151; border: 1px solid #e5e7eb; }
    </style>
</head>
<body>
    <h1 style="font-family:monospace;font-size:1rem;color:#6b7280;margin-bottom:1.5rem;">Font Preview — Logistics App Context</h1>
    <div class="grid" id="grid"></div>
    <script>
        const fonts = [
            { name: 'Inter',            family: "'Inter', sans-serif",            note: 'Current font' },
            { name: 'DM Sans',          family: "'DM Sans', sans-serif",          note: 'Recommended' },
            { name: 'Outfit',           family: "'Outfit', sans-serif",           note: 'Recommended' },
            { name: 'Plus Jakarta Sans',family: "'Plus Jakarta Sans', sans-serif", note: 'Polished' },
            { name: 'Geist',            family: "'Geist', sans-serif",            note: 'Sharp/Modern' },
            { name: 'Sora',             family: "'Sora', sans-serif",             note: 'Futuristic' },
            { name: 'IBM Plex Sans',    family: "'IBM Plex Sans', sans-serif",    note: 'Data-heavy' },
            { name: 'Figtree',          family: "'Figtree', sans-serif",          note: 'Geometric' },
            { name: 'Nunito Sans',      family: "'Nunito Sans', sans-serif",      note: 'Friendly' },
        ];
        const grid = document.getElementById('grid');
        fonts.forEach(f => {
            grid.innerHTML += `
            <div class="card" style="font-family:${f.family}">
                <div class="tag">${f.name} &nbsp;·&nbsp; ${f.note}</div>
                <div class="sample-heading">BookOrder — Shipment Booking</div>
                <div class="sample-sub">Customer: AGW Lifecare · Carrier: BlueDart</div>
                <div class="sample-body">Consignee: ARHAM MEDICAL STORE, Kashipur 244713<br>Mode: EXPRESS · Zone: Z5 · TAT: 5 days</div>
                <div class="sample-data">
                    <span class="badge">Wgt: 2.50 kg</span>
                    <span class="badge">ChgWt: 3.00 kg</span>
                    <span class="badge green">₹ 485.00</span>
                    <span class="badge gray">AWB: 12345678</span>
                </div>
            </div>`;
        });
    </script>
</body>
</html>
