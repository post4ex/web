<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices</title>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <style>
        .filter-active { background-color: #fca5a5 !important; color: #b91c1c !important; }
        .detail-card { background-color: #fff; border-radius: 0.5rem; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
        .detail-card-header { padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; background-color: #f9fafb; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; }
        .detail-card-body { padding: 1rem; }
    </style>
    <!-- Immediate Layout Cache Injection to Prevent Page Navigation Flicker -->
    <script>
        (() => {
            try {
                const cachedHeader = sessionStorage.getItem('component-header.html');
                const cachedFooter = sessionStorage.getItem('component-footer.html');
                if (!cachedHeader && !cachedFooter) return;
                
                const observer = new MutationObserver((mutations, obs) => {
                    const headerEl = cachedHeader ? document.getElementById('header-placeholder') : null;
                    const footerEl = cachedFooter ? document.getElementById('footer-placeholder') : null;
                    
                    if (headerEl && headerEl.getAttribute('data-fully-loaded') !== 'true') {
                        const doc = new DOMParser().parseFromString(cachedHeader, 'text/html');
                        const scripts = Array.from(doc.querySelectorAll('script'));
                        headerEl.innerHTML = '';
                        while (doc.body.firstChild) headerEl.appendChild(doc.body.firstChild);
                        
                        // Hydrate login/logout visibility state immediately to prevent visual flicker
                        const loginData = localStorage.getItem('loginData');
                        if (loginData) {
                            const loginBtn = headerEl.querySelector('#login-button');
                            if (loginBtn) loginBtn.classList.add('hidden');
                            
                            const publicNav = headerEl.querySelector('#container-desktop-public');
                            if (publicNav) publicNav.classList.add('hidden');
                            
                            const globalNotif = headerEl.querySelector('#notification-container-global');
                            if (globalNotif) globalNotif.classList.remove('hidden');

                            const searchBtn = headerEl.querySelector('#nav-search-private');
                            if (searchBtn) searchBtn.classList.remove('hidden');

                            const pincodeBtn = headerEl.querySelector('#nav-pincode-private');
                            if (pincodeBtn) pincodeBtn.classList.remove('hidden');

                            const privateNav = headerEl.querySelector('#container-desktop-private');
                            if (privateNav) {
                                privateNav.classList.remove('hidden');
                                privateNav.classList.add('flex');
                            }

                            const desktopLogout = headerEl.querySelector('#desktop-logout-button');
                            if (desktopLogout) {
                                desktopLogout.classList.remove('hidden');
                                desktopLogout.style.display = window.innerWidth >= 1280 ? 'flex' : 'none';
                            }
                            
                            const sidebarToggle = headerEl.querySelector('#sidebar-toggle-container');
                            if (sidebarToggle) sidebarToggle.classList.remove('hidden');
                        }
                        
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) newScript.src = script.src;
                            else newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        });
                        headerEl.setAttribute('data-fully-loaded', 'true');
                    }
                    
                    if (footerEl && footerEl.getAttribute('data-fully-loaded') !== 'true') {
                        const doc = new DOMParser().parseFromString(cachedFooter, 'text/html');
                        const scripts = Array.from(doc.querySelectorAll('script'));
                        footerEl.innerHTML = '';
                        while (doc.body.firstChild) footerEl.appendChild(doc.body.firstChild);
                        
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) newScript.src = script.src;
                            else newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        });
                        footerEl.setAttribute('data-fully-loaded', 'true');
                    }
                    
                    if ((!cachedHeader || (headerEl && headerEl.getAttribute('data-fully-loaded') === 'true')) &&
                        (!cachedFooter || (footerEl && footerEl.getAttribute('data-fully-loaded') === 'true'))) {
                        obs.disconnect();
                    }
                });
                
                observer.observe(document.documentElement, { childList: true, subtree: true });
            } catch (_) {}
        })();
    </script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
    <!-- Header placeholder -->
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <div class="split-view">

        <!-- Left Sidebar for Invoice List -->
        <aside id="shipmentListPane">
            <div class="sv-pane-header">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-xl font-bold text-gray-800">Invoices</h2>
                    <button id="unbilledToggleBtn" class="px-3 py-1 text-xs font-medium bg-gray-200 text-gray-700 rounded-md hover:bg-red-200 transition-colors">UnBilled</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="searchShipments" placeholder="Search INV#, ID, Code, Branch..." class="form-input w-full text-sm">
                    <button id="filterToggleBtn" class="p-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                    </button>
                </div>
            </div>
            <div id="shipmentListContainer" class="sv-pane-body">
                <p id="status-message" class="text-gray-600 p-4 text-center">Loading invoice data...</p>
                <ul id="shipmentList"></ul>
            </div>
        </aside>

        <!-- Main Content Area for Details -->
        <main id="shipmentDetailPane" class="p-6 md:p-8 hidden md:block bg-gray-50">

            <div class="p-4 border-b md:hidden bg-white -mt-6 -mx-6 mb-6 shadow-sm">
                <button type="button" id="backToListBtn" class="btn btn-sm flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to List
                </button>
            </div>

            <div id="detailView" class="hidden space-y-6">
                <div id="invoiceDetailsCardContainer" class="detail-card"></div>
                <div id="shipmentDetailsTableContainer" class="detail-card"></div>
                <div id="summaryTableContainer" class="detail-card"></div>
            </div>

            <div id="emptyView" class="h-full flex items-center justify-center">
                <p class="text-gray-500 text-lg">Select an invoice from the list to view included shipments.</p>
            </div>
        </main>
    </div>

    <!-- Filter Modal (uses modal styles from style.css) -->
    <div id="filterModal" class="modal-overlay hidden">
        <div class="modal-content space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Filter Invoices</h2>
                <button id="close-filter-modal" class="p-1.5 text-gray-500 rounded hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="filter-start-date" class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" id="filter-start-date" class="form-input mt-1 block w-full text-sm">
                </div>
                <div>
                    <label for="filter-end-date" class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" id="filter-end-date" class="form-input mt-1 block w-full text-sm">
                </div>
                <div>
                    <label for="filter-branch" class="block text-sm font-medium text-gray-700">Branch</label>
                    <select id="filter-branch" class="form-input mt-1 block w-full text-sm">
                        <option value="">All</option>
                    </select>
                </div>
                <div>
                    <label for="filter-code" class="block text-sm font-medium text-gray-700">Code</label>
                    <select id="filter-code" class="form-input mt-1 block w-full text-sm">
                        <option value="">All</option>
                    </select>
                </div>
                <!-- Carrier filter is less relevant for Invoices but kept for filter structure -->
                <div class="sm:col-span-2">
                    <label for="filter-carrier" class="block text-sm font-medium text-gray-700">Carrier</label>
                    <select id="filter-carrier" class="form-input mt-1 block w-full text-sm">
                        <option value="">All</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-4 pt-4 border-t">
                <button id="reset-filters" class="btn-ghost btn-sm">Reset</button>
                <button id="apply-filters" class="btn btn-sm">Apply Filters</button>
            </div>
        </div>
    </div>

    <!-- Footer placeholder -->
    <div id="footer-placeholder" class="mt-auto" style="min-height:26px"><div class="animate-pulse bg-gray-200 h-7 w-full"></div></div>

    <!-- Layout and docgen scripts (assuming layout.js handles headers/footers/auth setup) -->
    
    <script src="core/indexeddb.js"></script>
    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    
    <script src="jawaS/billing.js"></script>
</body>
</html>
