<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Pin</title>
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
    <!-- Load layout.js in head to ensure functions are available for inline scripts -->
    
    <script src="indexeddb.js"></script>
    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    <script src="core/searchpinweb.js"></script>
    <script type="module">
        import { searchPin } from './utils/searchpin.js';
        window.searchPin = searchPin;
    </script>
    <!-- Immediate Layout Cache Injection to Prevent Page Navigation Flicker -->
    <script>
        (() => {
            try {
                const cachedHeader = sessionStorage.getItem('component-header.html');
                const cachedFooter = sessionStorage.getItem('component-footer.html');
                if (!cachedHeader && !cachedFooter) return;
                
                const observer = new MutationObserver((mutations, obs) => {
                    const headerEl = cachedHeader ? document.getElementById('header-placeholder') : null;
                    const footerEl = cachedFooter ? document.getElementById('footer-placeholder') : null;
                    
                    if (headerEl && headerEl.getAttribute('data-fully-loaded') !== 'true') {
                        const doc = new DOMParser().parseFromString(cachedHeader, 'text/html');
                        const scripts = Array.from(doc.querySelectorAll('script'));
                        headerEl.innerHTML = '';
                        while (doc.body.firstChild) headerEl.appendChild(doc.body.firstChild);
                        
                        // Hydrate login/logout visibility state immediately to prevent visual flicker
                        const loginData = localStorage.getItem('loginData');
                        if (loginData) {
                            const loginBtn = headerEl.querySelector('#login-button');
                            if (loginBtn) loginBtn.classList.add('hidden');
                            
                            const publicNav = headerEl.querySelector('#container-desktop-public');
                            if (publicNav) publicNav.classList.add('hidden');
                            
                            const globalNotif = headerEl.querySelector('#notification-container-global');
                            if (globalNotif) globalNotif.classList.remove('hidden');

                            const searchBtn = headerEl.querySelector('#nav-search-private');
                            if (searchBtn) searchBtn.classList.remove('hidden');

                            const pincodeBtn = headerEl.querySelector('#nav-pincode-private');
                            if (pincodeBtn) pincodeBtn.classList.remove('hidden');

                            const privateNav = headerEl.querySelector('#container-desktop-private');
                            if (privateNav) {
                                privateNav.classList.remove('hidden');
                                privateNav.classList.add('flex');
                            }

                            const desktopLogout = headerEl.querySelector('#desktop-logout-button');
                            if (desktopLogout) {
                                desktopLogout.classList.remove('hidden');
                                desktopLogout.style.display = window.innerWidth >= 1280 ? 'flex' : 'none';
                            }
                            
                            const sidebarToggle = headerEl.querySelector('#sidebar-toggle-container');
                            if (sidebarToggle) sidebarToggle.classList.remove('hidden');
                        }
                        
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) newScript.src = script.src;
                            else newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        });
                        headerEl.setAttribute('data-fully-loaded', 'true');
                    }
                    
                    if (footerEl && footerEl.getAttribute('data-fully-loaded') !== 'true') {
                        const doc = new DOMParser().parseFromString(cachedFooter, 'text/html');
                        const scripts = Array.from(doc.querySelectorAll('script'));
                        footerEl.innerHTML = '';
                        while (doc.body.firstChild) footerEl.appendChild(doc.body.firstChild);
                        
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) newScript.src = script.src;
                            else newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        });
                        footerEl.setAttribute('data-fully-loaded', 'true');
                    }
                    
                    if ((!cachedHeader || (headerEl && headerEl.getAttribute('data-fully-loaded') === 'true')) &&
                        (!cachedFooter || (footerEl && footerEl.getAttribute('data-fully-loaded') === 'true'))) {
                        obs.disconnect();
                    }
                });
                
                observer.observe(document.documentElement, { childList: true, subtree: true });
            } catch (_) {}
        })();
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Header Placeholder (Outside container for standalone support) -->
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <main class="w-full flex-grow p-4 sm:p-8">
        <div class="container">
            <div class="card">
                <!-- Hidden on mobile: Only show on desktop (≥1024px) -->
                <h1 class="text-2xl font-bold text-center text-gray-800 mb-6 hidden lg:block">Pincode Serviceability</h1>

                <!-- Search Section -->
                <div style="background:#ffffff;border-radius:1.25rem;padding:1.75rem;box-shadow:0 20px 60px -10px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.08);margin-bottom:2rem;">
                <div class="flex flex-col sm:flex-row items-center gap-4">
                    <div class="flex rounded-lg overflow-hidden w-full sm:w-1/3 lg:w-1/4">
                        <button id="pinButton" class="btn rounded-r-none w-1/2 btn-active" style="padding-top:0.75rem;padding-bottom:0.75rem;">Pincode</button>
                        <button id="cityButton" class="btn rounded-l-none w-1/2" style="padding-top:0.75rem;padding-bottom:0.75rem;">City</button>
                    </div>
                    <input type="text" id="pincode-input" placeholder="Enter 6-digit Pincode" maxlength="6" class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-700 w-full">
                    <button id="pincode-search-button" class="btn w-full sm:w-auto" style="padding-top:0.75rem;padding-bottom:0.75rem;">
                        Search
                    </button>
                </div>
                </div>

                <!-- Results and Messages Section -->
                <div id="results-wrapper" class="hidden" style="background:#ffffff;border-radius:1.25rem;padding:1.75rem;box-shadow:0 20px 60px -10px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.08);">
                <div id="loading-indicator" class="hidden text-center text-gray-500 mb-4">
                    <p>Searching for pincode details...</p>
                </div>
                <div id="results-container" class="hidden space-y-4">
                    <!-- Results will be rendered here -->
                </div>
                <div id="message-box" class="hidden p-4 rounded-lg" role="alert">
                    <p id="message-text"></p>
                </div>
                </div>

                <!-- Inline Services Section Placeholder -->
                <div id="pincode-services-area" class="mt-12"></div>
            </div>

            <!-- Pincode page specific script -->
            <script>
            (function() {
        const pincodeInput = document.getElementById('pincode-input');
        const searchButton = document.getElementById('pincode-search-button');
        const resultsContainer = document.getElementById('results-container');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');
        const loadingIndicator = document.getElementById('loading-indicator');
        const servicesContainer = document.getElementById('pincode-services-area');

        let currentSearchType = 'pincode';
        const pinButton = document.getElementById('pinButton');
        const cityButton = document.getElementById('cityButton');

        function updateButtonStyles() {
            if (currentSearchType === 'pincode') {
                pinButton.classList.add('btn-active');
                cityButton.classList.remove('btn-active');
                pincodeInput.placeholder = 'Enter 6-digit Pincode';
                pincodeInput.maxLength = 6;
                pincodeInput.oninput = function() { this.value = this.value.replace(/[^0-9]/g, ''); };
            } else {
                cityButton.classList.add('btn-active');
                pinButton.classList.remove('btn-active');
                pincodeInput.placeholder = 'Enter City Name';
                pincodeInput.maxLength = 50;
                pincodeInput.oninput = null;
            }
        }

        pinButton.addEventListener('click', () => { currentSearchType = 'pincode'; updateButtonStyles(); });
        cityButton.addEventListener('click', () => { currentSearchType = 'city'; updateButtonStyles(); });
        updateButtonStyles();

        // Load inline services content only on desktop
        if (window.innerWidth >= 1024 && typeof loadDynamicContent === 'function') {
            loadDynamicContent('services.html', 'pincode-services-area');
        }

        const handleSearch = async () => {
            const query = pincodeInput.value.trim();
            const resultsWrapper = document.getElementById('results-wrapper');
            resultsContainer.innerHTML = '';
            resultsContainer.classList.add('hidden');
            messageBox.classList.add('hidden');
            if (resultsWrapper) resultsWrapper.classList.add('hidden');

            if (servicesContainer) servicesContainer.classList.remove('hidden');

            if (currentSearchType === 'pincode' && query.length !== 6) {
                showMessage('Please enter a valid 6-digit pincode.', 'error');
                return;
            }
            if (currentSearchType === 'city' && query.length < 3) {
                showMessage('Please enter at least 3 characters for city search.', 'error');
                return;
            }

            loadingIndicator.classList.remove('hidden');
            if (resultsWrapper) resultsWrapper.classList.remove('hidden');

            try {
                if (currentSearchType === 'pincode') {
                    const searchFn = window.searchPin || searchPinWeb;
                    const result = await searchFn(query);
                    if (!result.found) {
                        showMessage(result.error || 'Pincode not found.', 'error');
                    } else {
                        if (servicesContainer) servicesContainer.classList.add('hidden');
                        renderResults(query, result, null);
                    }
                } else {
                    const offices = await searchDestination(query);
                    if (!offices.length) {
                        showMessage('No results found for that city.', 'error');
                    } else {
                        if (servicesContainer) servicesContainer.classList.add('hidden');
                        renderResults(query, null, offices.map(o => ({ Name: o.NAME, Pincode: o.PINCODE, District: o.DISTRICT, State: o.STATE, BranchType: o.BRANCH_TYPE, DeliveryStatus: o.DELIVERY_STATUS })));
                    }
                }
            } catch (error) {
                console.error('Search error:', error);
                showMessage('An error occurred: ' + error.message, 'error');
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        };

        const renderResults = (pincode, courierData, postOffices) => {
            let html = '';

            if (courierData && courierData.found) {
                html += `
                    <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
                        <h2 class="text-xl font-semibold text-gray-800 mb-3">Serviceability for Pincode: ${pincode}</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2 text-gray-700">
                           <p><strong>City:</strong> ${courierData.CITY || 'N/A'}</p>
                           <p><strong>State:</strong> ${courierData.STATE || 'N/A'}</p>
                           <p><strong>Zone:</strong> ${courierData.ZONE || 'N/A'}</p>
                           <p><strong>ODA:</strong> ${courierData.ODA || 'N/A'}</p>
                           <p><strong>Express TAT:</strong> ${courierData.EXPRESS_TAT ?? 'N/A'}</p>
                           <p><strong>Airline TAT:</strong> ${courierData.AIRLINE_TAT ?? 'N/A'}</p>
                           <p><strong>Surface TAT:</strong> ${courierData.SURFACE_TAT ?? 'N/A'}</p>
                           <p><strong>Premium TAT:</strong> ${courierData.PREMIUM_TAT ?? 'N/A'}</p>
                        </div>
                    </div>`;
            }

            if (postOffices && postOffices.length > 0) {
                const firstResult = postOffices[0];
                html += `
                    <div class="p-4 bg-blue-50 border border-blue-200 rounded-lg mt-4">
                        <h2 class="text-xl font-semibold text-gray-800 mb-2">Results for: ${pincode}</h2>
                        ${firstResult.District ? `<p class="text-gray-600"><strong>District:</strong> ${firstResult.District}</p>` : ''}
                        ${firstResult.State ? `<p class="text-gray-600"><strong>State:</strong> ${firstResult.State}</p>` : ''}
                    </div>
                    <h3 class="text-lg font-semibold text-gray-700 pt-4">Available Post Offices:</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${postOffices.map(office => `
                            <div class="p-4 border rounded-lg bg-gray-50">
                                <p class="font-semibold text-gray-800">${office.Name || office}</p>
                                ${office.PINCODE ? `<p class="text-xs text-gray-500">${office.PINCODE}</p>` : ''}
                                ${office.BranchType ? `<p class="text-sm text-gray-500">${office.BranchType}</p>` : ''}
                            </div>
                        `).join('')}
                    </div>`;
            }
            
            resultsContainer.innerHTML = html;
            resultsContainer.classList.remove('hidden');
        };

        const showMessage = (text, type) => {
            messageText.textContent = text;
            messageBox.className = 'p-4 rounded-lg border';
            messageBox.classList.add(
                type === 'error' 
                ? 'bg-red-100 border-red-400 text-red-700' 
                : 'bg-green-100 border-green-400 text-green-700'
            );
            messageBox.classList.remove('hidden');
            const rw = document.getElementById('results-wrapper');
            if (rw) rw.classList.remove('hidden');
        };

        searchButton.addEventListener('click', handleSearch);
        pincodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSearch();
            }
        });
            })();
    </script>
        </div>
    </main>

    <!-- Footer Placeholder (Outside container for standalone support) -->
    <div id="footer-placeholder" class="mt-auto" style="min-height:26px"><div class="animate-pulse bg-gray-200 h-7 w-full"></div></div>
</body>
</html>
