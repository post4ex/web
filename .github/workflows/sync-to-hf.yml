name: Sync to HF Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Push deploy files to HF (only if changed)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qE "^(Dockerfile|README\.md|entrypoint\.sh|nginx\.conf)$"; then
            git config user.email "post4ex@gmail.com"
            git config user.name "post4ex"
            git checkout --orphan hf-deploy
            git reset
            git add Dockerfile README.md entrypoint.sh nginx.conf
            git commit -m "Deploy: $(date)"
            git remote add hf https://post4ex:$HF_TOKEN@huggingface.co/spaces/post4ex/web
            git push hf hf-deploy:main --force
            echo "Pushed deploy files to HF"
          else
            echo "No deploy file changes — skipping"
          fi
