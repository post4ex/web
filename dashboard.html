<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="assets/css/inter-font.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/fontawesome.css">

<body class="bg-gray-100 min-h-screen flex flex-col">
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <main class="flex-grow p-4 sm:p-8">
        <div class="container mx-auto">
            <!-- Thin Navigation Layer -->
            <div class="tray mb-4">
                <div class="grid grid-cols-6 md:grid-cols-12 gap-1 w-full">
                    <a href="Pincode.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#EFF6FF'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#2563EB" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span class="text-xs font-medium" style="color:#2563EB">Locator</span>

                    <a href="docs.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#EEF2FF'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#4338CA" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span class="text-xs font-medium" style="color:#4338CA">Docs</span>
                    </a>
                    <a href="dgr.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#FFFBEB'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#D97706" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                        <span class="text-xs font-medium" style="color:#D97706">DGR</span>
                    </a>
                    <a href="calendar.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#F0FDFA'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#0D9488" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <span class="text-xs font-medium" style="color:#0D9488">Calendar</span>

                    <a href="awareness.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#FFF7ED'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#EA580C" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
                        <span class="text-xs font-medium" style="color:#EA580C">Awareness</span>
                    </a>
                    <a href="career.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#FAF5FF'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#7C3AED" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <span class="text-xs font-medium" style="color:#7C3AED">Career</span>
                    </a>
                    <a href="faqs.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#ECFEFF'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#0891B2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span class="text-xs font-medium" style="color:#0891B2">FAQs</span>
                    </a>
                    <a href="about.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#475569" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span class="text-xs font-medium" style="color:#475569">About</span>
                    </a>
                    <a href="memos.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#FEFCE8'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#CA8A04" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        <span class="text-xs font-medium" style="color:#CA8A04">Memos</span>
                    </a>
                    <button onclick="window.openComplaintModal()" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#FEF2F2'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#DC2626" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span class="text-xs font-medium" style="color:#DC2626">Complaint</span>
                    </button>
                    <button onclick="window.openContactModal()" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#ECFDF5'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#059669" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <span class="text-xs font-medium" style="color:#059669">Contact</span>
                    </button>
                    <a href="login.html" class="flex flex-col items-center justify-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition-all text-center group" onmouseover="this.style.backgroundColor='#F0FDF4'" onmouseout="this.style.backgroundColor='white'">
                        <svg class="w-4 h-4 mb-1" style="color:#16A34A" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                        <span class="text-xs font-medium" style="color:#16A34A">Register</span>
                    </a>
                </div>
            </div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Dashboard</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="tray">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">Bookings — Last 7 Days</h2>
                    <canvas id="bookingsChart"></canvas>
                </div>
                <div class="tray">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">Top Destinations</h2>
                    <canvas id="shipmentsChart"></canvas>
                </div>
                <div class="tray">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">Orders by Carrier</h2>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder" class="mt-auto" style="min-height:26px"><div class="animate-pulse bg-gray-200 h-7 w-full"></div></div>

    <div id="contactModal" class="modal-overlay hidden">
        <div class="modal-content relative card">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Contact Details</h2>
            <button id="closeContactModalButton" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div class="space-y-4 text-gray-700">
                <div><h3 class="font-medium">Address:</h3><p class="text-gray-600">Shivlok Colony, Haripur, Dehradun - 248001</p></div>
                <div><h3 class="font-medium">Email:</h3><p class="text-gray-600">Post4Ex@gmail.com</p></div>
            </div>
        </div>
    </div>

    <!-- Service Content Area -->
    <div id="services-content-area" class="hidden"></div>

    <!-- Complaint Modal -->
    <div id="complaintModal" class="modal-overlay hidden">
         <div class="modal-content relative max-w-2xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation text-red-600"></i> Raise a Complaint
            </h2>
            <button id="closeComplaintModalButton" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors p-2">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="space-y-5">
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="complaintSearchInput" placeholder="Enter AWB / Reference No." class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all text-sm font-semibold">
                    </div>
                    <button id="complaintSearchButton" class="btn px-6 py-3">Find</button>
                </div>
                <div id="complaintLoadingIndicator" class="hidden text-center py-4">
                    <i class="fa-solid fa-circle-notch fa-spin text-blue-900 text-2xl"></i>
                    <p class="text-xs text-gray-500 mt-2 font-semibold">Locating Consignment...</p>
                </div>
                <div id="complaintResultsContainer" class="hidden p-3 bg-blue-50 border border-blue-100 rounded-lg text-sm text-blue-800"></div>
                <div id="complaintMessageContainer" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                            <select id="complaintCategory" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-900 text-sm bg-white">
                                <option value="">Select Issue Type...</option>
                                <option value="Delay">Delivery Delay</option>
                                <option value="Damaged">Damaged Item</option>
                                <option value="Status">Incorrect Status</option>
                                <option value="Lost">Lost Package</option>
                                <option value="Billing">Billing Dispute</option>
                                <option value="Other">Other Inquiry</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mobile</label>
                            <input type="tel" id="complainantMobile" placeholder="Your Number" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-900 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Description</label>
                        <textarea id="complaintMessage" rows="3" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-900 text-sm resize-none" placeholder="Describe the issue in detail..."></textarea>
                    </div>
                </div>
                <div class="flex items-center justify-between pt-2">
                    <div id="emailSendingStatus" class="text-xs font-bold text-gray-500 hidden">
                        <i class="fa-solid fa-spinner fa-spin mr-1"></i> Sending...
                    </div>
                    <button id="submitComplaintButton" class="btn px-8 py-3 ml-auto">
                        Submit Complaint
                    </button>
                </div>
            </div>
            <div id="complaintMessageBox" class="hidden mt-4 p-3 rounded-lg text-sm text-center font-semibold"></div>
        </div>
    </div>

    
    <script src="indexeddb.js"></script>
    <script src="core/app-config.js"></script>
    <script src="core/formatIST.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    <script>
        // Service loading function
        window.loadService = function(url) {
            const servicesArea = document.getElementById('services-content-area');
            if(servicesArea) {
                servicesArea.classList.remove('hidden');
                if (typeof window.loadDynamicContent === 'function') {
                    loadDynamicContent(url, 'services-content-area');
                }
                servicesArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // Modal functions
        window.openComplaintModal = function() {
            const modal = document.getElementById('complaintModal');
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
                document.getElementById('complaintSearchInput').value = '';
                document.getElementById('complaintMessageContainer').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('complaintResultsContainer').classList.add('hidden');
                document.getElementById('complaintMessageBox').classList.add('hidden');
            }
        }

        window.closeComplaintModal = function() {
            const modal = document.getElementById('complaintModal');
            if(modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        window.openContactModal = function() {
            const modal = document.getElementById('contactModal');
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                console.warn("Contact Modal not found. It might still be loading from the footer.");
                showNotification("Contact details are loading...", "info");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            let _charts = {};

            function buildCharts(appData) {
                const orders = Object.values(appData?.ORDERS || {});
                if (!orders.length) return;

                // ── 1. Bookings last 7 days ──────────────────────────────────
                const today = new Date();
                const labels7 = [];
                const counts7 = {};
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today); d.setDate(d.getDate() - i);
                    const key = d.toISOString().split('T')[0];
                    labels7.push(d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' }));
                    counts7[key] = 0;
                }
                orders.forEach(o => {
                    const d = parseDate(o.ORDER_DATE);
                    if (!d) return;
                    const k = d.toISOString().split('T')[0];
                    if (k in counts7) counts7[k]++;
                });

                // ── 2. Shipments by STATUS ───────────────────────────────────
                const cityMap = {};
                orders.forEach(o => {
                    const c = (o.DEST_CITY || 'Unknown').trim();
                    cityMap[c] = (cityMap[c] || 0) + 1;
                });
                const cityEntries = Object.entries(cityMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
                const cityLabels  = cityEntries.map(e => e[0]);
                const cityData    = cityEntries.map(e => e[1]);

                // ── 3. Bookings by CARRIER ───────────────────────────────────
                const carrierMap = {};
                orders.forEach(o => {
                    const c = o.CARRIER || 'Unknown';
                    carrierMap[c] = (carrierMap[c] || 0) + 1;
                });
                const carrierLabels = Object.keys(carrierMap);
                const carrierData   = Object.values(carrierMap);

                // ── Destroy old charts before re-render ──────────────────────
                Object.values(_charts).forEach(c => c.destroy());
                _charts = {};

                const bookingsCtx = document.getElementById('bookingsChart')?.getContext('2d');
                if (bookingsCtx) {
                    _charts.bookings = new Chart(bookingsCtx, {
                        type: 'line',
                        data: {
                            labels: labels7,
                            datasets: [{ label: 'Bookings', data: Object.values(counts7), backgroundColor: 'rgba(156,32,7,0.1)', borderColor: '#9C2007', borderWidth: 2, tension: 0.3, fill: true }]
                        },
                        options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
                    });
                }

                const shipmentsCtx = document.getElementById('shipmentsChart')?.getContext('2d');
                if (shipmentsCtx) {
                    _charts.shipments = new Chart(shipmentsCtx, {
                        type: 'bar',
                        data: {
                            labels: cityLabels,
                            datasets: [{ label: 'Bookings', data: cityData, backgroundColor: '#1D4ED8', borderRadius: 4 }]
                        },
                        options: { indexAxis: 'y', scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
                    });
                }

                const revenueCtx = document.getElementById('revenueChart')?.getContext('2d');
                if (revenueCtx) {
                    _charts.revenue = new Chart(revenueCtx, {
                        type: 'bar',
                        data: {
                            labels: carrierLabels,
                            datasets: [{ label: 'Orders', data: carrierData, backgroundColor: '#9C2007', borderRadius: 4 }]
                        },
                        options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
                    });
                }

                // update chart titles
                document.querySelector('#revenueChart')?.closest('.card')?.querySelector('h2')?.textContent && 
                    (document.querySelector('#revenueChart').closest('.card').querySelector('h2').textContent = 'Orders by Carrier');
            }

            window.addEventListener('appDataLoaded',    e => buildCharts(e.detail.data));
            window.addEventListener('appDataRefreshed', e => buildCharts(e.detail.data));

            window.addEventListener('indexedDBReady', async () => {
                if (Object.keys(_charts).length) return;
                const data = await getAppData();
                if (data && Object.keys(data.ORDERS || {}).length) buildCharts(data);
            });

            setTimeout(async () => {
                if (Object.keys(_charts).length) return;
                const data = await getAppData();
                if (data) buildCharts(data);
            }, 3000);

            // Complaint modal event listeners
            const complaintClose = document.getElementById('closeComplaintModalButton');
            const complaintModal = document.getElementById('complaintModal');
            if(complaintClose) complaintClose.addEventListener('click', window.closeComplaintModal);
            if(complaintModal) {
                complaintModal.addEventListener('click', (e) => {
                    if (e.target === complaintModal) window.closeComplaintModal();
                });
            }

            const searchBtn = document.getElementById('complaintSearchButton');
            const submitBtn = document.getElementById('submitComplaintButton');

            if(searchBtn) {
                searchBtn.addEventListener('click', async () => {
                    const awb = document.getElementById('complaintSearchInput').value.trim();
                    const loader = document.getElementById('complaintLoadingIndicator');
                    const results = document.getElementById('complaintResultsContainer');
                    if(!awb) return alert("Please enter an AWB number.");
                    loader.classList.remove('hidden');
                    results.classList.add('hidden');
                    
                    try {
                        const response = await callApi('getData', { collection: 'SHIPMENTS/ORDERS', query: awb, searchType: 'ref' });
                        loader.classList.add('hidden');
                        results.classList.remove('hidden');
                        const order = (response.orders && response.orders.length > 0) ? response.orders[0].order : null;
                        results.innerHTML = order ? `<strong>Found:</strong> Shipment <span>#${awb}</span> <br> <span class="text-xs text-gray-500">Status: ${order.STATUS || 'Active'}</span>` : `<span class="text-red-500">AWB not found.</span>`;
                    } catch (e) { loader.classList.add('hidden'); results.classList.remove('hidden'); results.innerHTML = "Error verifying AWB."; }
                });
            }

            if(submitBtn) {
                submitBtn.addEventListener('click', () => {
                    const cat = document.getElementById('complaintCategory').value;
                    const msg = document.getElementById('complaintMessage').value;
                    const box = document.getElementById('complaintMessageBox');
                    if(!cat || !msg) {
                        box.textContent = "Please fill all required fields.";
                        box.className = "mt-4 p-3 rounded-lg text-sm text-center font-semibold bg-red-100 text-red-700";
                        box.classList.remove('hidden');
                        return;
                    }
                    const status = document.getElementById('emailSendingStatus');
                    status.classList.remove('hidden');
                    submitBtn.disabled = true;
                    submitBtn.classList.add('opacity-50');
                    setTimeout(() => {
                        status.classList.add('hidden');
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('opacity-50');
                        box.textContent = "Complaint Registered Successfully! Ticket #8829 created.";
                        box.className = "mt-4 p-3 rounded-lg text-sm text-center font-semibold bg-green-100 text-green-700";
                        box.classList.remove('hidden');
                        setTimeout(() => window.closeComplaintModal(), 2000);
                    }, 1500);
                });
            }
        });
    </script>
</body>
</html>
