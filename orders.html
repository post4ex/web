<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>
    <link href="style.css" rel="stylesheet">
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <style>
        .form-input { border-radius:.375rem;border:1px solid #d1d5db;padding:.5rem .75rem;font-size:.875rem;width:100%;transition:border-color .2s; }
        .form-input:focus { outline:none;border-color:#4f46e5;box-shadow:0 0 0 1px #4f46e5; }

        #tilesView { display:flex;flex-direction:column;align-items:center;width:100%;height:100%;padding:2rem 1rem;overflow-y:auto; }
        .tile-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;width:100%;max-width:900px; }
        .tile { background:#fff;border-radius:.75rem;padding:1.5rem 1rem;text-align:center;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .15s; }
        .tile:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12); }
        .tile-icon { font-size:2rem;margin-bottom:.5rem; }
        .tile-label { font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem;color:#6b7280; }

        #splitView { display:none;width:100%;height:100%; }
        #splitView.active { display:flex;flex-direction:row; }

        #ordersListPane { width:100%;height:100%;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0; }
        @media(min-width:768px){ #ordersListPane { width:33.333%; } }
        @media(min-width:1024px){ #ordersListPane { width:25%; } }

        #ordersList li { padding:.75rem;border-radius:.5rem;cursor:pointer;transition:background-color .2s;border:1px solid #e5e7eb;line-height:1.4; }
        #ordersList li.selected { background-color:#e0e7ff;border-color:#c7d2fe; }
        #ordersList li:hover { background-color:#eef2ff; }
        #ordersList li strong { color:#4338ca;display:block;font-size:.875rem;font-weight:600; }

        #ordersDetailPane { flex:1;height:100%;overflow-y:auto;background:#f9fafb;padding:1.5rem 2rem; }
        .detail-card { background:#fff;border-radius:.5rem;border:1px solid #e5e7eb;box-shadow:0 1px 2px rgba(0,0,0,.05); }
        .detail-card-header { padding:.75rem 1rem;border-bottom:1px solid #e5e7eb;background:#f9fafb;border-radius:.5rem .5rem 0 0; }
        .detail-card-body { padding:1rem; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col" style="height:100vh;overflow:hidden;">
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <div class="flex flex-col" style="height:calc(100vh - 56px);overflow:hidden;">

        <!-- ── TILES VIEW ── -->
        <div id="tilesView">
            <div class="w-full mb-4 flex items-center gap-3" style="max-width:900px;">
                <h1 class="text-2xl font-bold text-gray-800 flex-1">Orders</h1>
            </div>
            <div class="tile-grid">
                <div class="tile" data-tile="pickup-request" style="border-color:#dbeafe;"><div class="tile-icon">🚐</div><div class="tile-label">Pickup Request</div></div>
                <div class="tile" data-tile="book-order"     style="border-color:#d1fae5;"><div class="tile-icon">📦</div><div class="tile-label">Book Order</div></div>
                <div class="tile" data-tile="assign-carrier" style="border-color:#fef3c7;"><div class="tile-icon">🚚</div><div class="tile-label">Assign Carrier</div></div>
            </div>
        </div>

        <!-- ── SPLIT VIEW ── -->
        <div id="splitView" style="height:100%;">
            <aside id="ordersListPane">
                <div class="p-4 border-b sticky top-0 bg-white z-10">
                    <div class="flex items-center gap-2 mb-3">
                        <button id="backToTilesBtn" class="text-gray-400 hover:text-gray-700 p-1 rounded" title="Back">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        </button>
                        <h2 id="splitTitle" class="text-lg font-bold text-gray-800 flex-1"></h2>
                        <button id="ordersAddBtn" class="btn-ghost btn-sm hidden">+ Add</button>
                    </div>
                    <input id="ordersSearch" type="text" placeholder="Search…" class="form-input text-sm">
                </div>
                <div class="overflow-y-auto flex-1 min-h-0 p-3">
                    <p id="ordersListMsg" class="text-gray-400 text-sm text-center py-8"></p>
                    <ul id="ordersList" class="space-y-2"></ul>
                </div>
            </aside>
            <main id="ordersDetailPane" style="display:none;flex:1;height:100%;overflow-y:auto;background:#f9fafb;padding:1.5rem 2rem;">
                <div class="p-4 border-b md:hidden bg-white -mt-6 -mx-6 mb-6 shadow-sm">
                    <button id="backToListBtn" class="btn-danger btn-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        Back
                    </button>
                </div>
                <div id="ordersDetailEmpty" class="h-full flex items-center justify-center">
                    <p class="text-gray-400 text-lg">Select an item to view details.</p>
                </div>
                <div id="ordersDetailView" class="hidden space-y-4"></div>
            </main>
        </div>

    </div>

    <div id="footer-placeholder" style="min-height:36px"><div class="animate-pulse bg-gray-200 h-10 w-full"></div></div>

    <script src="core/app-config.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    <script src="indexeddb.js"></script>
    <script src="core/formatIST.js"></script>
    <!-- order module scripts loaded here as built -->
    <script src="jawaS/orders.js"></script>
</body>
</html>
