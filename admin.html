<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link href="style.css" rel="stylesheet">
    <link href="assets/css/inter-font.css" rel="stylesheet">
    <style>
        .modal-overlay { position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center; }
        .modal-overlay.hidden { display:none; }
        .modal-content { background:#fff;border-radius:.5rem;padding:1.5rem;width:100%;max-width:32rem;margin:1rem;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto; }
        #userList li { padding:.75rem;border-radius:.5rem;cursor:pointer;transition:background-color .2s;border:1px solid #e5e7eb; }
        #userList li:hover { background-color:#eef2ff; }
        .form-input { border-radius:.375rem;border:1px solid #d1d5db;padding:.5rem .75rem;font-size:.875rem;width:100%;transition:border-color .2s; }
        .form-input:focus { outline:none;border-color:#4f46e5;box-shadow:0 0 0 1px #4f46e5; }
        .tab-btn { padding:.5rem 1rem;border-b-2 border-transparent text-sm font-medium text-gray-500 hover:text-indigo-600 cursor-pointer; }
        .tab-btn.border-indigo-600 { color:#4f46e5; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col">
    <div id="header-placeholder" style="min-height:56px"><div class="animate-pulse bg-gray-200 h-14 w-full"></div></div>

    <div class="flex w-full" style="height:calc(100vh - 56px);">

        <!-- Left Pane -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-white border-r flex flex-col" style="height:100%;overflow:hidden;">
            <div class="p-4 border-b bg-white sticky top-0 z-10">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-gray-800">Admin</h2>
                    <button id="addUserBtn" class="px-3 py-1 text-xs bg-indigo-600 text-white rounded hover:bg-indigo-700">+ Add User</button>
                </div>
                <!-- Tabs -->
                <div class="flex border-b">
                    <button class="tab-btn border-indigo-600 text-indigo-600" data-tab="users">Users</button>
                    <button class="tab-btn" data-tab="registrations">Registrations</button>
                </div>
            </div>

            <!-- Users panel -->
            <div data-panel="users" class="flex flex-col flex-grow overflow-hidden">
                <div class="p-3 border-b">
                    <input id="searchUsers" type="text" placeholder="Search users..." class="form-input text-sm">
                </div>
                <div class="overflow-y-auto flex-grow min-h-0 p-3">
                    <p id="user-status-msg" class="text-gray-500 text-sm text-center py-4">Loading...</p>
                    <ul id="userList" class="space-y-2"></ul>
                </div>
            </div>

            <!-- Registrations panel -->
            <div data-panel="registrations" class="hidden flex-col flex-grow overflow-hidden">
                <div class="overflow-y-auto flex-grow min-h-0 p-3 space-y-3">
                    <p id="reg-status-msg" class="text-gray-500 text-sm text-center py-4"></p>
                    <div id="regList"></div>
                </div>
            </div>
        </aside>

        <!-- Right Pane -->
        <main class="hidden md:flex flex-col flex-grow bg-gray-50 overflow-y-auto p-6">
            <div id="userEmptyView" class="flex-grow flex items-center justify-center">
                <p class="text-gray-400 text-lg">Select a user to view details.</p>
            </div>
            <div id="userDetailView" class="hidden max-w-2xl w-full mx-auto"></div>
        </main>
    </div>

    <div id="footer-placeholder" style="min-height:36px"><div class="animate-pulse bg-gray-200 h-10 w-full"></div></div>

    <!-- ── Sudo Modal ─────────────────────────────────────────────────────── -->
    <div id="sudoModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-lg font-semibold text-gray-800 mb-1">Admin Access Required</h2>
            <p class="text-sm text-gray-500 mb-4">Enter your credentials to receive an OTP.</p>
            <form id="sudoForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Username</label>
                    <input name="sudoUsername" required class="form-input" placeholder="your username">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Password</label>
                    <input name="sudoPassword" type="password" required class="form-input" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm font-medium">Send OTP</button>
            </form>
        </div>
    </div>

    <!-- ── Sudo OTP Modal ─────────────────────────────────────────────────── -->
    <div id="sudoOtpModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-lg font-semibold text-gray-800 mb-1">Verify OTP</h2>
            <p id="sudoOtpHint" class="text-sm text-gray-500 mb-4"></p>
            <form id="sudoOtpForm" class="space-y-3">
                <input name="sudoOtp" required class="form-input" placeholder="Enter OTP" maxlength="6">
                <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm font-medium">Verify</button>
            </form>
        </div>
    </div>

    <!-- ── Add User Modal ─────────────────────────────────────────────────── -->
    <div id="addUserModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-800">Add User</h2>
                <button data-close-modal="addUserModal" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
            </div>
            <form id="addUserForm" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Username *</label><input name="USER" required class="form-input text-sm"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Name *</label><input name="NAME" required class="form-input text-sm"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Email</label><input name="EMAIL" type="email" class="form-input text-sm"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Mobile</label><input name="MOBILE" class="form-input text-sm"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Branch</label><input name="BRANCH" class="form-input text-sm"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Role *</label>
                    <select name="ROLE" required class="form-input text-sm">
                        <option>CLIENT</option><option>STAFF</option><option>MANAGER</option>
                        <option>ACCOUNTANT</option><option>AUDITOR</option><option>ADMIN</option><option>MASTER</option>
                    </select>
                </div>
                <div class="sm:col-span-2"><label class="block text-xs font-medium text-gray-600 mb-1">Password</label><input name="PASS" type="password" class="form-input text-sm" placeholder="Leave blank to auto-generate"></div>
                <div class="sm:col-span-2 flex justify-end gap-2">
                    <button type="button" data-close-modal="addUserModal" class="px-4 py-2 bg-gray-200 text-gray-700 rounded text-sm">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm">Send OTP</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Add User OTP Modal ─────────────────────────────────────────────── -->
    <div id="addUserOtpModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-lg font-semibold text-gray-800 mb-1">Confirm Add User</h2>
            <p id="addUserOtpHint" class="text-sm text-gray-500 mb-4"></p>
            <form id="addUserOtpForm" class="space-y-3">
                <input name="addUserOtp" required class="form-input" placeholder="Enter OTP" maxlength="6">
                <button type="submit" class="w-full py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm font-medium">Confirm</button>
            </form>
        </div>
    </div>

    <script src="core/app-config.js"></script>
    <script src="core/app-notify.js"></script>
    <script src="core/app-api.js"></script>
    <script src="core/app-auth.js"></script>
    <script src="core/layout.js"></script>
    <script src="core/admin-api.js"></script>
    <script src="jawaS/admin-users.js"></script>
    <script src="jawaS/admin-registrations.js"></script>
    <script src="jawaS/admin.js"></script>
</body>
</html>
